const Helpers = {

  // Page header row with optional action button
  pageHeader(title, subtitle = '', action = null) {
    const wrap = document.createElement('div');
    wrap.className = 'cui-page-header';
    const left = document.createElement('div');
    left.innerHTML = `
      <div class="cui-page-title">${title}</div>
      ${subtitle ? `<div class="cui-page-subtitle">${subtitle}</div>` : ''}`;
    wrap.appendChild(left);
    if (action) wrap.appendChild(action);
    return wrap;
  },

  // Single announcement item element
  annItem(ann) {
    const wrap = document.createElement('div');
    wrap.className = 'cui-announcement' + (ann.pinned ? ' pinned' : '');
    wrap.innerHTML = `
      ${ann.pinned ? '<span class="cui-announcement-pin">📌 Pinned</span>' : ''}
      <div class="cui-announcement-title">${ann.title}</div>
      <div class="cui-announcement-body">${ann.body}</div>
      <div class="cui-announcement-meta">By ${ann.author} · ${ann.date}</div>`;
    return wrap;
  },

  // Sidebar footer with avatar + name/role
  sidebarFooter(name, role) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;gap:.65rem';
    const av = UI.avatar(name, 'sm');
    av.style.cssText = 'background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.35)';
    const info = document.createElement('div');
    info.style.minWidth = '0';
    info.innerHTML = `
      <div style="font-size:.85rem;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div>
      <div style="font-size:.72rem;color:rgba(255,255,255,.6)">${role}</div>`;
    wrap.append(av, info);
    return wrap;
  },

  // Refresh a card container with a new element
  refreshCard(containerId, buildFn) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = '';
    el.appendChild(buildFn());
  },
};

function navigate(name) {
  document.querySelectorAll('.cui-section').forEach(s => s.classList.remove('active'));

  sidebar.setActive(SECTIONS[name]);
  const center = document.querySelector('.cui-navbar-center');
  if (center) center.textContent = SECTIONS[name];
}

const Dashboard = {

  // Top row: progress analytics card + announcements
  // Bottom row: profile preview + recent attendance
  build() {
    const sec  = document.getElementById('sec-dashboard');
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';

    sec.appendChild(Helpers.pageHeader(
      `${greeting}, ${INTERN.name.split(' ')[0]}! 👋`,
      new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' })
    ));

    sec.appendChild( this.statStrip()  );
    sec.appendChild( this.progressBar());

    // Top row: announcements + progress insights
    const row1 = document.createElement('div');
    row1.className = 'pg-grid-2 mt-lg';
    row1.appendChild( this.announcementsCard()      );
    row1.appendChild( this.progressInsightsCard()   );
    sec.appendChild(row1);

    // Bottom row: profile preview + recent attendance
    const row2 = document.createElement('div');
    row2.className = 'pg-grid-2 mt-lg';
    row2.appendChild( this.profilePreviewCard()   );
    row2.appendChild( this.recentAttendanceCard() );
    sec.appendChild(row2);

    // Draw chart after DOM is attached
    setTimeout(() => this.drawHoursTrendChart(), 50);
  },

  // Horizontal 4-number stat strip
  statStrip() {
    const pct = Math.round(INTERN.totalHours / INTERN.reqHours * 100);
    return UI.statRow([
      { value: INTERN.totalHours + 'h',   label: 'Hours Rendered',    color: '#EA580C' },
      { value: INTERN.daysPresent,          label: 'Days Present',      color: '#10B981' },
      { value: INTERN.reportsSubmitted,     label: 'Reports Submitted', color: '#6366F1' },
      { value: pct + '%',                   label: 'Completion',        color: '#EA580C' },
    ]);
  },

  // Slim progress bar with label underneath
  progressBar() {
    const pct  = Math.round(INTERN.totalHours / INTERN.reqHours * 100);
    const wrap = document.createElement('div');
    wrap.style.marginBottom = '1rem';
    wrap.appendChild(UI.progress(pct, { color: { base: '#EA580C' }, label: true }));
    const sub = document.createElement('p');
    sub.style.cssText = 'font-size:.75rem;color:#9A6647;margin-top:.35rem';
    sub.textContent   = `${INTERN.totalHours}h of ${INTERN.reqHours}h required · ${INTERN.reqHours - INTERN.totalHours}h remaining`;
    wrap.appendChild(sub);
    return wrap;
  },

  // Progress insights card with projected finish + hours trend chart
  progressInsightsCard() {
    const pct        = Math.round(INTERN.totalHours / INTERN.reqHours * 100);
    const remaining  = INTERN.reqHours - INTERN.totalHours;
    const daysIn     = INTERN.daysPresent;
    const avgPerDay  = daysIn > 0 ? (INTERN.totalHours / daysIn) : 8;
    const daysNeeded = Math.ceil(remaining / avgPerDay);

    // Projected finish date from today
    const projDate = new Date();
    let workDaysAdded = 0;
    while (workDaysAdded < daysNeeded) {
      projDate.setDate(projDate.getDate() + 1);
      const day = projDate.getDay();
      if (day !== 0 && day !== 6) workDaysAdded++; // skip weekends
    }
    const projStr = projDate.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });

    // On pace check: expected ~70% by week 14 of 20-week internship
    const expectedPct = 70;
    const onPace      = pct >= expectedPct;

    const body = document.createElement('div');

    // On-pace badge
    const paceBadge = document.createElement('div');
    paceBadge.style.cssText = `display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .9rem;border-radius:20px;font-size:.82rem;font-weight:700;margin-bottom:1rem;background:${onPace?'#D1FAE5':'#FEE2E2'};color:${onPace?'#065F46':'#991B1B'}`;
    paceBadge.innerHTML = onPace
      ? '✅ You are on schedule'
      : `⚠️ ${expectedPct - pct}% behind the expected pace`;
    body.appendChild(paceBadge);

    // Key insights
    [
      ['📅', 'Projected finish',    projStr],
      ['⚡', 'Avg hours / day',     avgPerDay.toFixed(1) + 'h'],
      ['📆', 'Work days remaining', daysNeeded + ' days at current pace'],
      ['📄', 'Reports submitted',   INTERN.reportsSubmitted + ' of ~14 expected'],
    ].forEach(([icon, label, value]) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:flex-start;gap:.5rem;padding:.45rem 0;border-bottom:1px solid #FFF0E0;font-size:.82rem';
      row.innerHTML = `
        <span style="opacity:.55;flex-shrink:0;margin-top:.1rem">${icon}</span>
        <span style="color:#9A6647;min-width:130px;flex-shrink:0">${label}</span>
        <span style="font-weight:600;color:#1A0A00">${value}</span>`;
      body.appendChild(row);
    });

    // Mini hours trend chart
    const chartLabel = document.createElement('p');
    chartLabel.style.cssText = 'font-size:.75rem;font-weight:700;color:#9A6647;text-transform:uppercase;letter-spacing:.05em;margin:1rem 0 .4rem';
    chartLabel.textContent   = 'Your Daily Hours (Last 6 Days)';
    body.appendChild(chartLabel);

    const canvas = document.createElement('canvas');
    canvas.id     = 'chart-intern-trend';
    canvas.height = 80;
    body.appendChild(canvas);

    return UI.card({ title: '📈 My Progress Insights', body });
  },

  // Mini sparkline-style chart for intern's recent daily hours
  drawHoursTrendChart() {
    const ctx = document.getElementById('chart-intern-trend');
    if (!ctx || typeof Chart === 'undefined') return;

    const labels = ATTENDANCE_LOG.slice().reverse().map(l => l.date.split(',')[0]);
    const hours  = ATTENDANCE_LOG.slice().reverse().map(l => l.hours);

    new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data:                hours,
          borderColor:         '#EA580C',
          backgroundColor:     'rgba(234,88,12,.1)',
          pointBackgroundColor:'#EA580C',
          pointRadius:         3,
          pointHoverRadius:    5,
          tension:             0.3,
          fill:                true,
        }],
      },
      options: {
        responsive: true,
        plugins:    { legend: { display: false }, tooltip: {
          callbacks: { label: c => ` ${c.parsed.y}h` },
        }},
        scales: {
          y: {
            min:   7, max: 10,
            ticks: { callback: v => v+'h', font:{ size:10 } },
            grid:  { color: '#FFF0E0' },
          },
          x: { grid: { display:false }, ticks: { font:{ size:9 }, maxRotation:30 } },
        },
      },
    });
  },

  // Pinned-first announcement list
  announcementsCard() {
    const body = document.createElement('div');
    [...ANNOUNCEMENTS]
      .sort((a, b) => b.pinned - a.pinned)
      .forEach(a => body.appendChild(Helpers.annItem(a)));
    if (!ANNOUNCEMENTS.length)
      body.appendChild(UI.empty('📭', 'No announcements', 'Check back later.'));

    return UI.card({
      title: '📢 Announcements',
      headerActions: UI.badge(
        ANNOUNCEMENTS.filter(a => a.pinned).length + ' pinned', 'warning'
      ),
      body,
    });
  },

  // Quick company + supervisor snapshot with "View Profile" button
  profilePreviewCard() {
    const body = document.createElement('div');
    [
      ['🏢', INTERN.company],
      ['📍', INTERN.address.split(',').slice(-2).join(',').trim()],
      ['👤', 'Supervisor: ' + INTERN.supervisor],
      ['📅', INTERN.startDate + ' → ' + INTERN.endDate],
    ].forEach(([icon, text]) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:.5rem;align-items:flex-start;padding:.45rem 0;border-bottom:1px solid #FFF0E0;font-size:.82rem;color:#6B3A1F';
      row.innerHTML = `<span style="opacity:.55;flex-shrink:0">${icon}</span><span>${text}</span>`;
      body.appendChild(row);
    });

    const btn = UI.button('View Full Profile →', {
      block: true,
      color: { base:'#FFF7ED', hover:'#FFEDD5', text:'#EA580C', border:'#FED7AA' },
      onClick: () => navigate('profile'),
    });
    btn.style.marginTop = '.85rem';
    body.appendChild(btn);

    return UI.card({ title: '🏢 My Internship', body });
  },

  // Last 4 attendance rows
  recentAttendanceCard() {
    return UI.card({
      title: '🕐 Recent Attendance',
      padding: false,
      headerActions: UI.button('View all', {
        variant: 'ghost', size: 'sm',
        color: { base:'#FFF7ED', hover:'#FFEDD5', text:'#EA580C', border:'#FED7AA' },
        onClick: () => navigate('attendance'),
      }),
      body: UI.table([
        { key:'date',    label:'Date',  render: v => `<strong>${v}</strong>` },
        { key:'timeIn',  label:'In'   },
        { key:'timeOut', label:'Out'  },
        { key:'hours',   label:'Hrs', align:'center',
          render: v => `<span style="color:#EA580C;font-weight:700">${v}h</span>` },
      ], ATTENDANCE_LOG.slice(0, 4), { hoverable: true }),
    });
  },
};

  editButton() {
    return UI.button('✏️ Edit Profile', {
      block: true,

  // Company header + detail rows using UI.companyInfoCard
  companyCard() {

      position:   INTERN.position,
      address:    INTERN.address,
      supervisor: INTERN.supervisor,
      phone:      INTERN.companyPhone,
      email:      INTERN.companyEmail,
      startDate:  INTERN.startDate,
      endDate:    INTERN.endDate,

  // Total hours with progress bar
  hoursCard() {
    const pct  = Math.round(INTERN.totalHours / INTERN.reqHours * 100);
    const body = document.createElement('div');
    body.appendChild(UI.statRow([
      { value: INTERN.totalHours + 'h',                      label: 'Rendered',  color: '#EA580C' },
      { value: (INTERN.reqHours - INTERN.totalHours) + 'h',  label: 'Remaining', color: '#6B3A1F' },
      { value: pct + '%',                                     label: 'Complete',  color: '#10B981' },
    ]));
    const lbl = document.createElement('p');
    lbl.style.cssText = 'font-size:.78rem;color:#9A6647;margin:.7rem 0 .4rem';
    lbl.textContent   = `Progress toward ${INTERN.reqHours}h requirement`;
    body.appendChild(lbl);
    body.appendChild(UI.progress(pct, { color: { base: '#EA580C' }, label: true }));
    return UI.card({ title: '⏳ Hours Summary', body });
  },

  // Edit profile modal with sections
  openEditModal() {
    const body = document.createElement('div');

    const section = label => {
      const d = document.createElement('div');
      d.className = 'cui-form-section';
      d.textContent = label;
      body.appendChild(d);
    };
    const twoCol = () => {
      const d = document.createElement('div');
      d.className = 'cui-form-row';
      body.appendChild(d);
      return d;
    };

    section('Personal Information');
    body.appendChild(UI.formGroup('Full Name',
      UI.input({ value: INTERN.name,      placeholder: 'Full name' })));
    body.appendChild(UI.formGroup('Phone',
      UI.input({ value: INTERN.phone,     placeholder: '+63 9xx xxx xxxx' })));
    const r1 = twoCol();
    r1.appendChild(UI.formGroup('Course',
      UI.input({ value: INTERN.course,    placeholder: 'e.g. BSIT' })));
    r1.appendChild(UI.formGroup('Year Level',
      UI.input({ value: INTERN.yearLevel, placeholder: 'e.g. 4th Year' })));

    section('Internship / Company');
    body.appendChild(UI.formGroup('Company Name',
      UI.input({ value: INTERN.company,    placeholder: 'Company name' })));
    body.appendChild(UI.formGroup('Position',
      UI.input({ value: INTERN.position,   placeholder: 'e.g. IT Intern' })));
    body.appendChild(UI.formGroup('Address',
      UI.textarea({ value: INTERN.address, rows: 2, placeholder: 'Full address' })));
    body.appendChild(UI.formGroup('Supervisor',
      UI.input({ value: INTERN.supervisor, placeholder: 'Supervisor name' })));
    const r2 = twoCol();
    r2.appendChild(UI.formGroup('Start Date', UI.input({ type: 'date', value: '2026-01-13' })));
    r2.appendChild(UI.formGroup('End Date',   UI.input({ type: 'date', value: '2026-05-30' })));

    const m = UI.modal({
      title: '✏️ Edit Profile', body, size: 'lg',
      footer: [
        UI.button('Cancel',      { variant:'ghost', size:'sm', onClick: () => m.close() }),
        UI.button('Save Changes', { size:'sm',
          color: { base:'#EA580C', hover:'#C2410C', text:'#fff' },
          onClick: () => { UI.toast('Profile saved! (Connect to PHP)', 'success'); m.close(); } }),
      ],
    });
    m.open();
  },
};


// ─────────────────────────────────────────────────────────────
//  ATTENDANCE
// ─────────────────────────────────────────────────────────────
const Attendance = {

  build() {
    const sec = document.getElementById('sec-attendance');
    sec.appendChild(Helpers.pageHeader('Attendance', 'Track your daily time in and out'));

    const grid = document.createElement('div');
    grid.className = 'pg-grid-2';
    grid.style.alignItems = 'start';
    grid.appendChild( this.clockCard()    );
    grid.appendChild( this.hoursCard()    );
    sec.appendChild(grid);

    sec.appendChild( this.logCard() );

    this.startClock();
    this.renderClockState();
  },

  // Live clock + time in/out buttons
  clockCard() {
    const body = document.createElement('div');
    body.className = 'cui-clock';
    body.innerHTML = `
      <div class="cui-clock-time" id="clock-display">--:--:--</div>
      <div class="cui-clock-date" id="clock-date-display"></div>
      <div id="clock-status-wrap" style="margin-top:.75rem"></div>
      <div class="cui-clock-actions" id="clock-btn-wrap"></div>
      <div id="clock-summary"
        style="display:none;padding:.75rem 0 0;text-align:center;font-size:.85rem;color:#9A6647"></div>
    `;
    return UI.card({ title: '🕐 Time Tracker', body });
  },

  // Big hours number + stat strip + progress bar
  hoursCard() {
    const pct  = Math.round(INTERN.totalHours / INTERN.reqHours * 100);
    const body = document.createElement('div');

    const big = document.createElement('div');
    big.style.cssText = 'text-align:center;padding:1rem 0';
    big.innerHTML = `
      <div style="font-family:Sora,sans-serif;font-size:2.5rem;font-weight:800;color:#EA580C;line-height:1">
        ${INTERN.totalHours}h
      </div>
      <div style="font-size:.8rem;color:#9A6647;margin-top:.3rem">of ${INTERN.reqHours}h required</div>`;
    body.appendChild(big);

    body.appendChild(UI.statRow([
      { value: INTERN.daysPresent,                           label: 'Days Present', color: '#EA580C' },
      { value: (INTERN.reqHours - INTERN.totalHours) + 'h', label: 'Hours Left',   color: '#6B3A1F' },
      { value: pct + '%',                                    label: 'Complete',     color: '#10B981' },
    ]));

    const lbl = document.createElement('p');
    lbl.style.cssText = 'font-size:.78rem;color:#9A6647;margin:.8rem 0 .4rem';
    lbl.textContent   = 'Progress toward completion';
    body.appendChild(lbl);
    body.appendChild(UI.progress(pct, { color: { base: '#EA580C' }, label: true }));

    return UI.card({ title: '📊 My Hours', body });
  },

  // Full attendance log table
  logCard() {
    return UI.card({
      title: '📋 Attendance Log',
      padding: false,
      body: UI.table([
        { key:'date',    label:'Date',     render: v => `<strong>${v}</strong>` },
        { key:'timeIn',  label:'Time In'  },
        { key:'timeOut', label:'Time Out' },
        { key:'hours',   label:'Hours',   align: 'center',
          render: v => `<span style="color:#EA580C;font-weight:700">${v}h</span>` },
      ], ATTENDANCE_LOG, { hoverable: true }),
    });
  },

  // Tick every second
  startClock() {
    const tick = () => {
      const n   = new Date();
      const dEl = document.getElementById('clock-display');
      const dtEl= document.getElementById('clock-date-display');
      if (dEl)  dEl.textContent  = n.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      if (dtEl) dtEl.textContent = n.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    };
    tick();
    setInterval(tick, 1000);
  },

  // Rebuild status badge + buttons based on current clockState
  renderClockState() {
    const statusWrap = document.getElementById('clock-status-wrap');
    const btnWrap    = document.getElementById('clock-btn-wrap');
    if (!statusWrap) return;
    statusWrap.innerHTML = '';
    btnWrap.innerHTML    = '';

    // Status badge
    const badge = document.createElement('div');
    badge.className = 'cui-clock-status ' + {
      none: 'cui-clock-status-idle',
      in:   'cui-clock-status-in',
      done: 'cui-clock-status-idle',
    }[clockState];
    badge.innerHTML = {
      none: '<span style="opacity:.5">⭕</span> Not yet timed in today',
      in:   `<span style="color:#10B981">●</span> Timed in at ${timeInStamp?.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' })}`,
      done: '✅ Completed for today',
    }[clockState];
    statusWrap.appendChild(badge);

    // Time In button
    btnWrap.appendChild(UI.button('⏱ Time In', {
      variant: 'success', size: 'lg',
      disabled: clockState !== 'none',
      onClick: () => {
        timeInStamp = new Date();
        clockState  = 'in';
        Attendance.renderClockState();
        UI.toast('Timed in at ' + timeInStamp.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }), 'success');
      },
    }));

    // Time Out button
    btnWrap.appendChild(UI.button('🔴 Time Out', {
      variant: 'danger', size: 'lg',
      disabled: clockState !== 'in',
      onClick: () => {
        const out = new Date();
        const hrs = ((out - timeInStamp) / 3600000).toFixed(2);
        clockState  = 'done';
        Attendance.renderClockState();
        const summary = document.getElementById('clock-summary');
        summary.style.display = 'block';
        summary.innerHTML = `
          <strong style="color:#EA580C">
            ${timeInStamp.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' })}
          </strong>
          &nbsp;→&nbsp;
          <strong style="color:#EA580C">
            ${out.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' })}
          </strong>
          &nbsp;·&nbsp;<strong>${hrs}h</strong> rendered`;
        UI.toast(`Timed out · ${hrs}h logged today`, 'success');
      },
    }));
  },
};


// ─────────────────────────────────────────────────────────────
//  REPORTS
// ─────────────────────────────────────────────────────────────
const Reports = {

  build() {
    const sec = document.getElementById('sec-reports');
    sec.appendChild(Helpers.pageHeader('Weekly Reports', 'Submit and track your internship reports'));

    const grid = document.createElement('div');
    grid.className = 'pg-grid-2';
    grid.style.alignItems = 'start';
    grid.appendChild( this.submitCard()  );
    grid.appendChild( this.tableCard()   );
    sec.appendChild(grid);

    this.setDefaultDate();
  },

  // Upload form card
  submitCard() {
    const body = document.createElement('div');

    body.appendChild(UI.formGroup('Week Label',
      UI.input({ id:'rpt-week', placeholder:'e.g. Week 14 (Apr 21–25)', required: true }),
      '', { required: true }));

    body.appendChild(UI.formGroup('Week Start Date',
      UI.input({ type:'date', id:'rpt-date', required: true })));

    body.appendChild(UI.formGroup('Description (optional)',
      UI.textarea({ id:'rpt-desc', placeholder:'What tasks did you accomplish this week?', rows: 3 })));

    body.appendChild(UI.formGroup('Report File',
      UI.uploadZone({
        label:  'Click to browse or drag & drop',
        hint:   'PDF, DOC, DOCX, PNG, JPG — max 10 MB',
        accept: '.pdf,.doc,.docx,.png,.jpg,.jpeg',
        name:   'report_file',
        onFile: f => UI.toast('Selected: ' + f.name, 'info'),
      })
    ));

    body.appendChild(UI.button('📤 Submit Report', {
      block: true, size: 'lg',
      color: { base:'#EA580C', hover:'#C2410C', text:'#fff' },
      onClick: () => {
        const w = document.getElementById('rpt-week').value.trim();
        if (!w) { UI.toast('Please enter a week label.', 'danger'); return; }
        UI.toast('Report submitted! (Connect to PHP to save)', 'success');
      },
    }));

    return UI.card({ title: '📤 Submit New Report', body });
  },

  // Submitted reports table with status badges + feedback rows
  tableCard() {
    const statusClass = { pending:'rs-pending', approved:'rs-approved', revision:'rs-revision', reviewed:'rs-reviewed' };
    const statusLabel = { pending:'⏳ Pending', approved:'✅ Approved', revision:'🔁 Revision', reviewed:'👁 Reviewed' };

    const tbl = UI.table([
      { key:'week',   label:'Week',
        render: v => `<strong>${v}</strong>` },
      { key:'file',   label:'File',
        render: v => `<a href="#" style="color:#EA580C;font-size:.8rem;text-decoration:none">📄 ${v}</a>` },
      { key:'status', label:'Status', align:'center',
        render: v => {
          const b = document.createElement('span');
          b.className   = 'cui-badge ' + statusClass[v];
          b.textContent = statusLabel[v];
          return b;
        }},
      { key:'date', label:'Uploaded',
        render: v => `<span style="font-size:.8rem;color:#9A6647">${v}</span>` },
    ], REPORTS, { hoverable: true });

    // Inject feedback rows beneath rows that have feedback
    const tbody = tbl.querySelector('tbody');
    let offset  = 0;
    REPORTS.forEach((r, i) => {
      if (!r.feedback) return;
      const fr = tbody.insertRow(i + 1 + offset++);
      fr.innerHTML = `
        <td colspan="4"
          style="background:#FFFBEB;font-size:.8rem;color:#92400E;padding:.5rem 1rem">
          💬 <strong>Feedback:</strong> ${r.feedback}
        </td>`;
    });

    return UI.card({
      title: '📋 Submitted Reports',
      padding: false,
      headerActions: UI.badge(REPORTS.length + ' submitted', 'warning'),
      body: tbl,
    });
  },

  // Default week-start to the most recent Monday
  setDefaultDate() {
    const mon = new Date();
    mon.setDate(mon.getDate() - ((mon.getDay() + 6) % 7));
    const d = document.getElementById('rpt-date');
    if (d) d.value = mon.toISOString().split('T')[0];
  },
};


// ─────────────────────────────────────────────────────────────

fetch('config/api.php', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },

    action: 'getAllInternData'
  })
})
.then(res => {
  console.log('API response status:', res.status);
  return res.json();
})
.then(data => {
  InternData = data;

  console.log('InternData:', InternData);

  Dashboard.build();
  Profile.build();
  Attendance.build();
  Reports.build();
})
.catch(error => {
  console.error('Fetch error:', error);
});
</script>
