function navigate(name) {

// ════════════════════════════════════════════════════════════
//  SECTION: DASHBOARD
// ════════════════════════════════════════════════════════════
function buildDashboard() {
  const sec = document.getElementById('sec-dashboard');

  // Page header
  const hour  = new Date().getHours();
  const greet = hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';
  sec.appendChild(makePageHeader(`${greet}, ${INTERN.name.split(' ')[0]}! 👋`,
    new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})));

  // Compact stat strip + progress in one card
  const pct  = Math.round(INTERN.totalHours / INTERN.reqHours * 100);

  // Stat strip (horizontal, smaller)
  sec.appendChild(UI.statRow([
    { value: INTERN.totalHours+'h',      label:'Hours Rendered',    color:'#EA580C' },
    { value: INTERN.daysPresent,          label:'Days Present',      color:'#10B981' },
    { value: INTERN.reportsSubmitted,     label:'Reports Submitted', color:'#6366F1' },
    { value: pct+'%',                     label:'Completion',        color:'#EA580C' },
  ]));

  // Progress bar inline under stats
  const progWrap = document.createElement('div');
  progWrap.style.cssText = 'margin-bottom:1.25rem';
  const progBar = UI.progress(pct, { color:{ base:'#EA580C' }, label:true });
  const progSub = document.createElement('p');
  progSub.style.cssText = 'font-size:.75rem;color:#9A6647;margin-top:.35rem';
  progSub.textContent = INTERN.totalHours+'h of '+INTERN.reqHours+'h required · '+(INTERN.reqHours-INTERN.totalHours)+'h remaining';
  progWrap.appendChild(progBar);
  progWrap.appendChild(progSub);
  sec.appendChild(progWrap);

  // Two column: announcements + recent attendance
  const row = document.createElement('div');
  row.className = 'pg-grid-3 mt-lg';

  // Announcements
  const annBody = document.createElement('div');
  [...ANNOUNCEMENTS].sort((a,b)=>b.pinned-a.pinned).forEach(a => annBody.appendChild(makeAnnItem(a)));
  if (!ANNOUNCEMENTS.length) annBody.appendChild(UI.empty('📭','No announcements','Check back later.'));

  row.appendChild(UI.card({
    title:'📢 Announcements',
    headerActions: UI.badge(ANNOUNCEMENTS.filter(a=>a.pinned).length+' pinned','warning'),
    body: annBody,
  }));

  // Recent attendance
  // Profile preview card — company + supervisor + view button
  const profPreviewBody = document.createElement('div');
  [
    ['🏢', INTERN.company],
    ['📍', INTERN.address.split(',').slice(-2).join(',').trim()],
    ['👤', 'Supervisor: '+INTERN.supervisor],
    ['📅', INTERN.startDate+' → '+INTERN.endDate],
  ].forEach(([icon, text]) => {
    const row2 = document.createElement('div');
    row2.style.cssText = 'display:flex;align-items:flex-start;gap:.5rem;padding:.45rem 0;border-bottom:1px solid #FFF0E0;font-size:.82rem;color:#6B3A1F';
    row2.innerHTML = `<span style="opacity:.6;flex-shrink:0">${icon}</span><span>${text}</span>`;
    profPreviewBody.appendChild(row2);
  });
  const viewProfBtn = UI.button('View Full Profile →', {
    block: true,
    color:{ base:'#FFF7ED', hover:'#FFEDD5', text:'#EA580C', border:'#FED7AA' },
    onClick:()=>navigate('profile'),
  });
  viewProfBtn.style.marginTop = '.85rem';
  profPreviewBody.appendChild(viewProfBtn);

  row.appendChild(UI.card({ title:'🏢 My Internship', body: profPreviewBody }));

  row.appendChild(UI.card({
    title:'🕐 Recent Attendance',
    padding: false,
    headerActions: UI.button('View all',{
      variant:'ghost', size:'sm',
      color:{ base:'#FFF7ED', hover:'#FFEDD5', text:'#EA580C', border:'#FED7AA' },
      onClick:()=>navigate('attendance'),
    }),
    body: UI.table([
      { key:'date',    label:'Date',    render:v=>`<strong>${v}</strong>` },
      { key:'timeIn',  label:'In' },
      { key:'timeOut', label:'Out' },
      { key:'hours',   label:'Hrs',    align:'center',
        render:v=>`<span style="color:#EA580C;font-weight:700">${v}h</span>` },
    ], ATTENDANCE_LOG.slice(0,4), { hoverable:true }),
  }));

  sec.appendChild(row);
}

function buildAttendance() {

  grid.style.alignItems = 'start';

  // Clock card body (built manually, inserted into UI.card)
  const clockBody = document.createElement('div');
  clockBody.className = 'cui-clock';
  clockBody.innerHTML = `
    <div class="cui-clock-time" id="clock-display">--:--:--</div>
    <div class="cui-clock-date" id="clock-date-display"></div>
    <div id="clock-status-wrap" style="margin-top:.75rem"></div>
    <div class="cui-clock-actions" id="clock-btn-wrap"></div>
    <div id="clock-summary" style="display:none;padding:.75rem 0 0;text-align:center;font-size:.85rem;color:#9A6647"></div>
  `;
  grid.appendChild(UI.card({ title:'🕐 Time Tracker', body:clockBody }));

  // Hours summary card
  const pct   = Math.round(INTERN.totalHours / INTERN.reqHours * 100);
  const hBody = document.createElement('div');

  const big = document.createElement('div');
  big.style.cssText = 'text-align:center;padding:1rem 0';
  big.innerHTML = `
    <div style="font-family:Sora,sans-serif;font-size:2.75rem;font-weight:800;color:#EA580C;line-height:1">${INTERN.totalHours}h</div>
    <div style="font-size:.8rem;color:#9A6647;margin-top:.3rem">of ${INTERN.reqHours}h required</div>`;
  hBody.appendChild(big);

  hBody.appendChild(UI.statRow([
    { value:INTERN.daysPresent,                           label:'Days Present', color:'#EA580C' },
    { value:(INTERN.reqHours-INTERN.totalHours)+'h',      label:'Hours Left',   color:'#6B3A1F' },
    { value:pct+'%',                                      label:'Complete',     color:'#10B981' },
  ]));
  const pl = document.createElement('p');
  pl.style.cssText = 'font-size:.78rem;color:#9A6647;margin:.8rem 0 .4rem';
  pl.textContent   = 'Progress toward completion';
  hBody.appendChild(pl);
  hBody.appendChild(UI.progress(pct, { color:{ base:'#EA580C' }, label:true }));

  grid.appendChild(UI.card({ title:'📊 My Hours', body:hBody }));
  sec.appendChild(grid);

  // Attendance log table card
  sec.appendChild(UI.card({
    title:'📋 Attendance Log',
    padding: false,
    body: UI.table([
      { key:'date',    label:'Date',    render:v=>`<strong>${v}</strong>` },
      { key:'timeIn',  label:'Time In' },
      { key:'timeOut', label:'Time Out' },
      { key:'hours',   label:'Hours',   align:'center',
        render:v=>`<span style="color:#EA580C;font-weight:700">${v}h</span>` },
    ], ATTENDANCE_LOG, { hoverable:true }),
  }));

  // Start clock + render buttons
  startClock();
  renderClock();
}

function startClock() {
  const tick = () => {
    const n   = new Date();
    const dEl = document.getElementById('clock-display');
    const dtEl= document.getElementById('clock-date-display');
    if (dEl)  dEl.textContent  = n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    if (dtEl) dtEl.textContent = n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  };
  tick();
  setInterval(tick, 1000);
}

function renderClock() {
  const statusWrap = document.getElementById('clock-status-wrap');
  const btnWrap    = document.getElementById('clock-btn-wrap');
  if (!statusWrap) return;
  statusWrap.innerHTML = '';
  btnWrap.innerHTML    = '';

  // Status badge
  const badge = document.createElement('div');
  badge.className = 'cui-clock-status ' + { none:'cui-clock-status-idle', in:'cui-clock-status-in', done:'cui-clock-status-idle' }[clockState];
  badge.innerHTML = {
    none: '<span style="opacity:.5">⭕</span> Not yet timed in today',
    in:   `<span style="color:#10B981">●</span> Timed in at ${timeInStamp?.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) ?? ''}`,
    done: '✅ Completed for today',
  }[clockState];
  statusWrap.appendChild(badge);

  // Time-in button
  btnWrap.appendChild(UI.button('⏱ Time In', {
    variant:'success', size:'lg',
    disabled: clockState !== 'none',
    onClick:() => {
      timeInStamp = new Date();
      clockState  = 'in';
      renderClock();
      UI.toast('Timed in at '+timeInStamp.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}), 'success');
    },
  }));

  // Time-out button
  btnWrap.appendChild(UI.button('🔴 Time Out', {
    variant:'danger', size:'lg',
    disabled: clockState !== 'in',
    onClick:() => {
      const out = new Date();
      const hrs = ((out-timeInStamp)/3600000).toFixed(2);
      clockState  = 'done';
      renderClock();
      const summary = document.getElementById('clock-summary');
      summary.style.display = 'block';
      summary.innerHTML = `
        <strong style="color:#EA580C">${timeInStamp.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</strong>
        &nbsp;→&nbsp;
        <strong style="color:#EA580C">${out.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</strong>
        &nbsp;·&nbsp; <strong>${hrs}h</strong> rendered`;
      UI.toast(`Timed out · ${hrs}h logged today`, 'success');
    },
  }));
}

// ════════════════════════════════════════════════════════════
function buildReports() {
  const sec = document.getElementById('sec-reports');
  sec.appendChild(makePageHeader('Weekly Reports','Submit and track your internship reports'));

  const grid = document.createElement('div');
  grid.className = 'pg-grid-2';
  grid.style.alignItems = 'start';

  // Upload form
  const formBody = document.createElement('div');
  formBody.appendChild(UI.formGroup('Week Label',
    UI.input({ id:'rpt-week', placeholder:'e.g. Week 14 (Apr 21–25)', required:true }), '', { required:true }));
  formBody.appendChild(UI.formGroup('Week Start Date',
    UI.input({ type:'date', id:'rpt-date', required:true })));
  formBody.appendChild(UI.formGroup('Description (optional)',
    UI.textarea({ id:'rpt-desc', placeholder:'What tasks did you accomplish this week?', rows:3 })));
  formBody.appendChild(UI.formGroup('Report File',
    UI.uploadZone({
      label:'Click to browse or drag & drop',
      hint:'PDF, DOC, DOCX, PNG, JPG — max 10 MB',
      accept:'.pdf,.doc,.docx,.png,.jpg,.jpeg',
      name:'report_file',
      onFile: f => UI.toast('Selected: '+f.name, 'info'),
    })
  ));
  formBody.appendChild(UI.button('📤 Submit Report',{
    block:true, size:'lg',
    color:{ base:'#EA580C', hover:'#C2410C', text:'#fff' },
    onClick:() => {
      const w = document.getElementById('rpt-week').value.trim();
      if (!w) { UI.toast('Please enter a week label.','danger'); return; }
      UI.toast('Report submitted! (Connect to PHP to save)','success');
    },
  }));

  grid.appendChild(UI.card({ title:'📤 Submit New Report', body:formBody }));

  // Reports table
  const sl = { pending:'rs-pending', approved:'rs-approved', revision:'rs-revision', reviewed:'rs-reviewed' };
  const tl = { pending:'⏳ Pending', approved:'✅ Approved', revision:'🔁 Revision', reviewed:'👁 Reviewed' };

  const tbl = UI.table([
    { key:'week',   label:'Week',     render:v=>`<strong>${v}</strong>` },
    { key:'file',   label:'File',     render:v=>`<a href="#" style="color:#EA580C;font-size:.8rem;text-decoration:none">📄 ${v}</a>` },
    { key:'status', label:'Status',   align:'center',
      render:v=>{ const b=document.createElement('span'); b.className='cui-badge '+sl[v]; b.textContent=tl[v]; return b; } },
    { key:'date',   label:'Uploaded', render:v=>`<span style="font-size:.8rem;color:#9A6647">${v}</span>` },
  ], REPORTS, { hoverable:true });

  // Inject feedback rows
  const tbody = tbl.querySelector('tbody');
  let off=0;
  REPORTS.forEach((r,i) => {
    if (!r.feedback) return;
    const fr = tbody.insertRow(i+1+off++);
    fr.innerHTML = `<td colspan="4" style="background:#FFFBEB;font-size:.8rem;color:#92400E;padding:.5rem 1rem">💬 <strong>Feedback:</strong> ${r.feedback}</td>`;
  });

  grid.appendChild(UI.card({
    title:'📋 Submitted Reports',
    padding: false,
    headerActions: UI.badge(REPORTS.length+' submitted','warning'),
    body: tbl,
  }));

  sec.appendChild(grid);

  // Set default date
  const mon = new Date();
  mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  const d = document.getElementById('rpt-date');
  if (d) d.value = mon.toISOString().split('T')[0];
}

function makePageHeader(title, subtitle='') {
  const wrap = document.createElement('div');
  wrap.className = 'cui-page-header';
  wrap.innerHTML = `
    <div>
      <div class="cui-page-title">${title}</div>
      ${subtitle ? `<div class="cui-page-subtitle">${subtitle}</div>` : ''}
    </div>`;
  return wrap;
}

function makeAnnItem(ann) {
  const wrap = document.createElement('div');
  wrap.className = 'cui-announcement' + (ann.pinned?' pinned':'');
  wrap.innerHTML = `
    ${ann.pinned?'<span class="cui-announcement-pin">📌 Pinned</span>':''}
    <div class="cui-announcement-title">${ann.title}</div>
    <div class="cui-announcement-body">${ann.body}</div>
    <div class="cui-announcement-meta">By ${ann.author} · ${ann.date}</div>`;
  return wrap;
}

function makeSidebarFooter() {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;align-items:center;gap:.65rem';
  const av = UI.avatar(INTERN.name,'sm');
  av.style.cssText = 'background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.35)';
  const info = document.createElement('div');
  info.style.minWidth = '0';
  info.innerHTML = `
    <div style="font-size:.85rem;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${INTERN.name}</div>
    <div style="font-size:.72rem;color:rgba(255,255,255,.6)">${INTERN.course}</div>`;
  wrap.append(av, info);
  return wrap;
}
