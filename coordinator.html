<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CITAS — Coordinator Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/uiParts.css">
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #FFF7ED; margin: 0; }
    .cui-card-title, .cui-page-title { font-family: 'Sora', sans-serif; }

    /* Announcement item in coordinator manage view */
    .ann-item {
      background: #fff;
      border: 1px solid #FED7AA;
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      margin-bottom: .7rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      transition: box-shadow .15s;
    }
    .ann-item:hover { box-shadow: 0 4px 12px rgba(234,88,12,.1); }
    .ann-item.pinned { border-color: #EA580C; background: #FFF7ED; }
    .ann-item-body    { flex: 1; min-width: 0; }
    .ann-item-title   { font-family: Sora, sans-serif; font-weight: 700; color: #1A0A00; font-size: .95rem; }
    .ann-item-text    { font-size: .84rem; color: #6B3A1F; margin-top: .25rem; line-height: 1.6; }
    .ann-item-meta    { font-size: .74rem; color: #9A6647; margin-top: .4rem; }
    .ann-item-actions { display: flex; flex-direction: column; gap: .4rem; flex-shrink: 0; }
  </style>
</head>
<body>

<div class="cui-page-layout">
  <div class="cui-page-main" id="page-main">
    <div class="cui-page-content">
      <section class="cui-section active" id="sec-dashboard"></section>
      <section class="cui-section"        id="sec-interns"></section>
      <section class="cui-section"        id="sec-announcements"></section>
    </div>
  </div>
</div>

<script src="assets/uiParts.js"></script>
<script>
'use strict';

// ─────────────────────────────────────────────────────────────
//  DATA
//  PHP: replace with json_encode output
// ─────────────────────────────────────────────────────────────
const COORDINATOR = {
  name:  'Dr. Maria Santos',
  email: 'msantos@samar.edu.ph',
  role:  'Coordinator',
};

let INTERNS = [
  { id:1, name:'Juan dela Cruz',  email:'juan@samar.edu.ph',   dept:'BSIT', school:'Samar College',  company:'TechHub Innovations', supervisor:'Engr. Santos',   totalHours:128, daysPresent:24, reports:6 },
  { id:2, name:'Maria Reyes',     email:'maria@samar.edu.ph',  dept:'BSCS', school:'Samar College',  company:'DataSoft Solutions',  supervisor:'Ms. Villanueva', totalHours:96,  daysPresent:18, reports:5 },
  { id:3, name:'Pedro Santos',    email:'pedro@samar.edu.ph',  dept:'BSIT', school:'Eastern Samar',  company:'NetCom PH',           supervisor:'Mr. Cruz',       totalHours:64,  daysPresent:12, reports:3 },
  { id:4, name:'Ana Villanueva',  email:'ana@samar.edu.ph',    dept:'BSBA', school:'Samar College',  company:'MerCom Trading',      supervisor:'Mr. Dela Cruz',  totalHours:112, daysPresent:21, reports:6 },
  { id:5, name:'Carlo Mendoza',   email:'carlo@samar.edu.ph',  dept:'BSCS', school:'Eastern Samar',  company:'SoftWave Inc.',        supervisor:'Ms. Santos',     totalHours:80,  daysPresent:15, reports:4 },
  { id:6, name:'Liza Fernandez',  email:'liza@samar.edu.ph',   dept:'BSBA', school:'Samar College',  company:'PrimeCo Corp.',        supervisor:'Engr. Reyes',    totalHours:144, daysPresent:27, reports:7 },
];

let ANNOUNCEMENTS = [
  { id:1, pinned:true,  title:'Required Documents Reminder',
    body:"Submit your MOA and endorsement letter on or before April 30.",
    author:'Dr. Santos', date:'Apr 20, 2026' },
  { id:2, pinned:false, title:'Weekly Report Deadline',
    body:'Week 14 reports must be submitted no later than Friday 5:00 PM.',
    author:'Dr. Santos', date:'Apr 18, 2026' },
  { id:3, pinned:false, title:'Holiday Notice',
    body:'The office will be closed on April 25. Adjust attendance accordingly.',
    author:'Ms. Reyes',  date:'Apr 15, 2026' },
];

let nextAnnId = 4;

// Filter state for interns section
let filterSearch = '';
let filterDept   = '';
let filterSort   = 'name';


// ─────────────────────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────────────────────
const SECTIONS = {
  dashboard:     'Dashboard',
  interns:       'Interns',
  announcements: 'Announcements',
};

// ─────────────────────────────────────────────────────────────
//  SHARED HELPERS
// ─────────────────────────────────────────────────────────────
const Helpers = {

  pageHeader(title, subtitle = '', action = null) {
    const wrap = document.createElement('div');
    wrap.className = 'cui-page-header';
    const left = document.createElement('div');
    left.innerHTML = `
      <div class="cui-page-title">${title}</div>
      ${subtitle ? `<div class="cui-page-subtitle">${subtitle}</div>` : ''}`;
    wrap.appendChild(left);
    if (action) wrap.appendChild(action);
    return wrap;
  },

  // Small inline orange button used throughout coordinator page
  orangeBtn(label, onClick) {
    return UI.button(label, {
      size: 'sm',
      color: { base:'#EA580C', hover:'#C2410C', text:'#fff' },
      onClick,
    });
  },

  // Ghost button with orange hover — used for secondary actions
  ghostBtn(label, onClick) {
    return UI.button(label, {
      variant: 'ghost', size: 'sm',
      color: { base:'#FFF7ED', hover:'#FFEDD5', text:'#EA580C', border:'#FED7AA' },
      onClick,
    });
  },

  // Intern avatar element
  internAvatar(name, size = 'sm') {
    const av = UI.avatar(name, size);
    av.style.background = 'linear-gradient(135deg,#FF6B00,#EA580C)';
    av.style.flexShrink = '0';
    return av;
  },

  // Sidebar footer with avatar + name/role
  sidebarFooter(name, role) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;gap:.65rem';
    const av = UI.avatar(name, 'sm');
    av.style.cssText = 'background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.35)';
    const info = document.createElement('div');
    info.style.minWidth = '0';
    info.innerHTML = `
      <div style="font-size:.85rem;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div>
      <div style="font-size:.72rem;color:rgba(255,255,255,.6)">${role}</div>`;
    wrap.append(av, info);
    return wrap;
  },

  // Refresh any card container by id
  refreshCard(id, buildFn) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    el.appendChild(buildFn());
  },
};


const sidebar = UI.pageSidebar({
  brand:     'Coordinator Panel',   // role-specific label
  brandIcon: '🗂️',
  items: [
    { section:true, label:'Menu' },
    { label:'Dashboard',     icon:'🏠', active:true,  onClick: () => navigate('dashboard')     },
    { label:'Interns',       icon:'👥',               onClick: () => navigate('interns')       },
    { label:'Announcements', icon:'📢',
      badge: ANNOUNCEMENTS.filter(a => a.pinned).length || null,
      onClick: () => navigate('announcements') },
    { section:true, label:'Account' },
    { label:'Sign Out', icon:'🚪',
      onClick: () => { if (confirm('Sign out of CITAS?')) location.href = '/'; } },
  ],
  footer: Helpers.sidebarFooter(COORDINATOR.name, COORDINATOR.role),
});

const topbar = UI.navbar({
  brand:     'CITAS',               // system brand on navbar
  brandIcon: '🎓',
  sidebar,
  pageTitle: 'Dashboard',
  right: [
    UI.badge('Coordinator', { base:'#FFF7ED', text:'#EA580C', border:'#FED7AA' }),
    (() => {
      const av = UI.avatar(COORDINATOR.name, 'sm');
      av.style.background = 'linear-gradient(135deg,#FF6B00,#EA580C)';
      return av;
    })(),
  ],
});
document.getElementById('page-main').prepend(topbar.el);

function navigate(name) {
  document.querySelectorAll('.cui-section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  sidebar.setActive(SECTIONS[name]);
  const center = document.querySelector('.cui-navbar-center');
  if (center) center.textContent = SECTIONS[name];
}




// ─────────────────────────────────────────────────────────────
//  DASHBOARD
// ─────────────────────────────────────────────────────────────
const Dashboard = {

  build() {
    const sec  = document.getElementById('sec-dashboard');
    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';

    sec.appendChild(Helpers.pageHeader(
      `${greeting}, ${COORDINATOR.name.split(' ').pop()}! 👋`,
      new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' }),
      Helpers.orangeBtn('📢 Post Announcement', () => {
        navigate('announcements');
        setTimeout(() => Announcements.openCreateModal(), 150);
      })
    ));

    sec.appendChild( this.statStrip()     );
    sec.appendChild( this.bottomRow()     );
  },

  // Horizontal stat strip — mirrors intern page style
  statStrip() {
    const totalHours   = INTERNS.reduce((s, i) => s + i.totalHours,   0);
    const todayPresent = 4; // PHP: count of interns with a time_log today
    const pendingRpts  = 3; // PHP: weekly_reports WHERE status='pending'

    return UI.statRow([
      { value: INTERNS.length,         label: 'Total Interns',    color: '#EA580C' },
      { value: todayPresent,            label: 'Present Today',    color: '#10B981' },
      { value: pendingRpts,             label: 'Pending Reports',  color: '#F59E0B' },
      { value: ANNOUNCEMENTS.length,   label: 'Announcements',    color: '#6366F1' },
    ]);
  },

  // Two-column: recent interns table + recent announcements
  bottomRow() {
    const row = document.createElement('div');
    row.className = 'pg-grid-2 mt-lg';
    row.appendChild( this.recentInternsCard()       );
    row.appendChild( this.recentAnnouncementsCard() );
    return row;
  },

  // Top 4 interns, clickable row opens detail modal
  recentInternsCard() {
    return UI.card({
      title: '👥 Recent Interns',
      padding: false,
      headerActions: Helpers.ghostBtn('View all →', () => navigate('interns')),
      body: UI.table([
        { key:'name',       label:'Name',   render: v => `<strong>${v}</strong>` },
        { key:'dept',       label:'Dept'   },
        { key:'totalHours', label:'Hours',  align:'center',
          render: v => `<span style="font-weight:700;color:#EA580C">${v}h</span>` },
      ], INTERNS.slice(0, 4), {
        hoverable:  true,
        emptyText:  'No interns yet.',
        onRowClick: intern => Interns.openDetailModal(intern),
      }),
    });
  },

  // 3 most recent announcements, compact
  recentAnnouncementsCard() {
    const body = document.createElement('div');

    if (!ANNOUNCEMENTS.length) {
      body.appendChild(UI.empty('📭', 'No announcements yet', ''));
      return UI.card({ title: '📢 Recent Announcements', body });
    }

    [...ANNOUNCEMENTS]
      .sort((a, b) => b.pinned - a.pinned)
      .slice(0, 3)
      .forEach(ann => {
        const item = document.createElement('div');
        item.style.cssText = 'padding:.7rem 0;border-bottom:1px solid #FFF0E0';
        item.innerHTML = `
          <div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.15rem">
            ${ann.pinned
              ? `<span class="cui-badge" style="background:#FFF7ED;color:#EA580C;border:1px solid #FED7AA;font-size:.68rem">📌</span>`
              : ''}
            <span style="font-family:Sora,sans-serif;font-weight:700;font-size:.875rem;color:#1A0A00">${ann.title}</span>
          </div>
          <div style="font-size:.78rem;color:#9A6647">${ann.date}</div>`;
        body.appendChild(item);
      });

    return UI.card({
      title: '📢 Recent Announcements',
      headerActions: Helpers.ghostBtn('Manage →', () => navigate('announcements')),
      body,
    });
  },
};


// ─────────────────────────────────────────────────────────────
//  INTERNS
// ─────────────────────────────────────────────────────────────
const Interns = {

  build() {
    const sec = document.getElementById('sec-interns');

    sec.appendChild(Helpers.pageHeader(
      'Interns',
      INTERNS.length + ' interns enrolled',
      Helpers.orangeBtn('➕ Add Intern', () => this.openRegisterModal())
    ));

    sec.appendChild( this.filterBar()     );
    sec.appendChild( this.tableContainer());
    this.renderTable();
  },

  // Search + dept + sort filter bar using UI.input and UI.select
  filterBar() {
    const bar = document.createElement('div');
    bar.className = 'cui-filter-bar';

    const search = UI.input({ placeholder: '🔍 Search name or email…' });
    search.addEventListener('input', e => {
      filterSearch = e.target.value.toLowerCase();
      this.renderTable();
    });

    const depts  = [...new Set(INTERNS.map(i => i.dept))].sort();
    const dept   = UI.select({ options: depts, placeholder: 'All Departments' });
    dept.style.minWidth = '160px';
    dept.addEventListener('change', e => {
      filterDept = e.target.value;
      this.renderTable();
    });

    const sort   = UI.select({ options: [
      { value:'name',    label:'Sort: Name A–Z'   },
      { value:'hours',   label:'Sort: Most Hours'  },
      { value:'days',    label:'Sort: Most Days'   },
      { value:'reports', label:'Sort: Most Reports'},
    ]});
    sort.style.minWidth = '160px';
    sort.addEventListener('change', e => {
      filterSort = e.target.value;
      this.renderTable();
    });

    bar.append(search, dept, sort);
    return bar;
  },

  // Container div that renderTable() swaps in and out
  tableContainer() {
    const wrap = document.createElement('div');
    wrap.id = 'interns-table-wrap';
    return wrap;
  },

  // Get filtered + sorted intern list
  filteredList() {
    return [...INTERNS]
      .filter(i =>
        (!filterSearch || i.name.toLowerCase().includes(filterSearch) || i.email.toLowerCase().includes(filterSearch)) &&
        (!filterDept   || i.dept === filterDept))
      .sort((a, b) => ({
        name:    a.name.localeCompare(b.name),
        hours:   b.totalHours  - a.totalHours,
        days:    b.daysPresent  - a.daysPresent,
        reports: b.reports      - a.reports,
      }[filterSort] ?? 0));
  },

  // Build and insert the interns table
  renderTable() {
    const list = this.filteredList();
    const wrap = document.getElementById('interns-table-wrap');
    if (!wrap) return;
    wrap.innerHTML = '';

    const tbl = UI.table([
      { key:'name', label:'Intern',
        render: (v, row) => {
          const cell = document.createElement('div');
          cell.style.cssText = 'display:flex;align-items:center;gap:.65rem';
          const info = document.createElement('div');
          info.innerHTML = `
            <div style="font-weight:700;color:#1A0A00">${v}</div>
            <div style="font-size:.75rem;color:#9A6647">${row.email}</div>`;
          cell.append(Helpers.internAvatar(v), info);
          return cell;
        }},
      { key:'dept',        label:'Dept'   },
      { key:'school',      label:'School',
        render: v => `<span style="font-size:.82rem;color:#9A6647">${v}</span>` },
      { key:'company',     label:'Company',
        render: v => `<span style="font-size:.82rem">${v}</span>` },
      { key:'daysPresent', label:'Days',    align:'center',
        render: v => UI.badge(v, { base:'#D1FAE5', text:'#065F46' }) },
      { key:'totalHours',  label:'Hours',   align:'center',
        render: v => `<strong style="color:#EA580C">${v}h</strong>` },
      { key:'reports',     label:'Reports', align:'center',
        render: v => UI.badge(v, { base:'#DBEAFE', text:'#1E40AF' }) },
      { key:'id', label:'', align:'center',
        render: (_, row) => Helpers.ghostBtn('View', () => this.openDetailModal(row)) },
    ], list, {
      hoverable:  true,
      emptyText:  'No interns match your filters.',
    });

    wrap.appendChild(UI.card({
      title:   `Showing ${list.length} intern${list.length !== 1 ? 's' : ''}`,
      padding: false,
      body:    tbl,
    }));
  },

  // Intern detail modal — profile + stats + company info
  openDetailModal(intern) {
    const body = document.createElement('div');

    // Profile header row
    const header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid #FED7AA';
    const info = document.createElement('div');
    info.innerHTML = `
      <div style="font-family:Sora,sans-serif;font-size:1.05rem;font-weight:800;color:#1A0A00">${intern.name}</div>
      <div style="font-size:.8rem;color:#9A6647;margin-top:.15rem">${intern.email}</div>
      <div style="font-size:.8rem;color:#9A6647">${intern.dept} · ${intern.school}</div>`;
    header.append(Helpers.internAvatar(intern.name, 'lg'), info);
    body.appendChild(header);

    // Stat strip — same pattern as dashboard
    body.appendChild(UI.statRow([
      { value: intern.totalHours + 'h', label: 'Total Hours',   color: '#EA580C' },
      { value: intern.daysPresent,       label: 'Days Present',  color: '#10B981' },
      { value: intern.reports,           label: 'Reports Filed', color: '#6366F1' },
    ]));

    // Progress toward 500h requirement
    const pct = Math.min(100, Math.round(intern.totalHours / 500 * 100));
    const lbl = document.createElement('p');
    lbl.style.cssText = 'font-size:.78rem;color:#9A6647;margin:.9rem 0 .4rem';
    lbl.textContent   = `Completion: ${intern.totalHours}h of 500h required (${pct}%)`;
    body.appendChild(lbl);
    body.appendChild(UI.progress(pct, { color: { base:'#EA580C' }, label: true }));

    // Company card
    const compLabel = document.createElement('div');
    compLabel.style.cssText = 'font-family:Sora,sans-serif;font-weight:700;color:#1A0A00;font-size:.875rem;margin:1.25rem 0 .6rem';
    compLabel.textContent   = 'Internship Details';
    body.appendChild(compLabel);
    body.appendChild(UI.companyInfoCard({
      company:    intern.company,
      position:   intern.dept + ' Intern',
      supervisor: intern.supervisor,
    }));

    const m = UI.modal({
      title: '👤 Intern Details',
      body,
      size: 'lg',
      footer: [
        UI.button('Close', { variant:'ghost', size:'sm', onClick: () => m.close() }),
        Helpers.orangeBtn('Send Message', () => { UI.toast('Messaging coming soon!', 'info'); }),
      ],
    });
    m.open();
  },

  // Register new intern modal
  openRegisterModal() {
    const body = document.createElement('div');
    const section = t => { const d=document.createElement('div'); d.className='cui-form-section'; d.textContent=t; body.appendChild(d); };
    const twoCol  = () => { const d=document.createElement('div'); d.className='cui-form-row'; body.appendChild(d); return d; };

    section('Personal Information');
    body.appendChild(UI.formGroup('Full Name',
      UI.input({ id:'reg-name', placeholder:'Juan dela Cruz', required:true }), '', { required:true }));
    body.appendChild(UI.formGroup('School Email',
      UI.input({ type:'email', id:'reg-email', placeholder:'you@samar.edu.ph', required:true })));
    const r1 = twoCol();
    r1.appendChild(UI.formGroup('Course / Dept',
      UI.input({ id:'reg-dept', placeholder:'e.g. BSIT' })));
    r1.appendChild(UI.formGroup('School',
      UI.input({ id:'reg-school', placeholder:'e.g. Samar College' })));

    section('Internship Details');
    body.appendChild(UI.formGroup('Company Name',
      UI.input({ id:'reg-company', placeholder:'Host company name' })));
    const r2 = twoCol();
    r2.appendChild(UI.formGroup('Start Date', UI.input({ type:'date', id:'reg-start' })));
    r2.appendChild(UI.formGroup('End Date',   UI.input({ type:'date', id:'reg-end'   })));

    section('Account');
    body.appendChild(UI.formGroup('Temporary Password',
      UI.input({ type:'password', id:'reg-pass', placeholder:'Min. 6 characters', required:true }),
      'Share with the intern — they can change it after signing in.'));

    const m = UI.modal({
      title: '➕ Register New Intern',
      body,
      size: 'lg',
      footer: [
        UI.button('Cancel', { variant:'ghost', size:'sm', onClick: () => m.close() }),
        Helpers.orangeBtn('Create Account', () => {
          const name = document.getElementById('reg-name')?.value.trim();
          if (!name) { UI.toast('Please enter a name.', 'danger'); return; }
          UI.toast(`Account created for ${name}! (Demo)`, 'success');
          m.close();
        }),
      ],
    });
    m.open();
  },
};


// ─────────────────────────────────────────────────────────────
//  ANNOUNCEMENTS
// ─────────────────────────────────────────────────────────────
const Announcements = {

  build() {
    const sec = document.getElementById('sec-announcements');
    sec.appendChild(Helpers.pageHeader(
      'Announcements',
      'Post updates and notices for all interns',
      Helpers.orangeBtn('+ New Announcement', () => this.openCreateModal())
    ));

    const listWrap = document.createElement('div');
    listWrap.id = 'ann-list-wrap';
    sec.appendChild(listWrap);

    this.renderList();
  },

  // Re-render the entire announcements list
  renderList() {
    const wrap = document.getElementById('ann-list-wrap');
    if (!wrap) return;
    wrap.innerHTML = '';

    if (!ANNOUNCEMENTS.length) {
      wrap.appendChild(UI.empty(
        '📭', 'No announcements yet', 'Post your first update for interns.',
        Helpers.orangeBtn('+ New Announcement', () => this.openCreateModal())
      ));
      return;
    }

    [...ANNOUNCEMENTS]
      .sort((a, b) => b.pinned - a.pinned)
      .forEach(ann => wrap.appendChild(this.annItem(ann)));
  },

  // Single announcement card with pin / edit / delete actions
  annItem(ann) {
    const wrap = document.createElement('div');
    wrap.className = 'ann-item' + (ann.pinned ? ' pinned' : '');

    // Body — title + text + meta
    const body = document.createElement('div');
    body.className = 'ann-item-body';
    body.innerHTML = `
      ${ann.pinned ? '<span style="font-size:.72rem;font-weight:700;color:#EA580C;display:block;margin-bottom:.2rem">📌 Pinned</span>' : ''}
      <div class="ann-item-title">${ann.title}</div>
      <div class="ann-item-text">${ann.body}</div>
      <div class="ann-item-meta">By ${ann.author} · ${ann.date}</div>`;

    // Actions column
    const actions = document.createElement('div');
    actions.className = 'ann-item-actions';

    // Pin / Unpin toggle
    actions.appendChild(Helpers.ghostBtn(ann.pinned ? 'Unpin' : '📌 Pin', () => {
      ann.pinned = !ann.pinned;
      this.renderList();
      UI.toast(ann.pinned ? 'Announcement pinned.' : 'Unpinned.', 'info');
    }));

    // Edit
    actions.appendChild(Helpers.ghostBtn('✏️ Edit', () => this.openEditModal(ann)));

    // Delete
    actions.appendChild(UI.button('🗑 Delete', {
      variant: 'ghost', size: 'sm',
      color: { base:'#FEF2F2', hover:'#FEE2E2', text:'#991B1B', border:'#FECACA' },
      onClick: () => {
        if (!confirm(`Delete "${ann.title}"?`)) return;
        ANNOUNCEMENTS = ANNOUNCEMENTS.filter(a => a.id !== ann.id);
        this.renderList();
        UI.toast('Announcement deleted.', 'danger');
      },
    }));

    wrap.append(body, actions);
    return wrap;
  },

  // Shared form body builder used by create + edit modals
  buildForm({ title = '', body = '', pinned = false } = {}) {
    const wrap = document.createElement('div');

    wrap.appendChild(UI.formGroup('Title',
      UI.input({ id:'ann-form-title', value: title, placeholder:'Announcement title', required:true }),
      '', { required:true }));

    wrap.appendChild(UI.formGroup('Message',
      UI.textarea({ id:'ann-form-body', value: body, placeholder:'Write your message for interns…', rows:5 })));

    const pinLabel = document.createElement('label');
    pinLabel.style.cssText = 'display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.85rem;font-weight:600;color:#6B3A1F;margin-top:.5rem';
    pinLabel.innerHTML = `
      <input type="checkbox" id="ann-form-pin" ${pinned ? 'checked' : ''}
        style="width:15px;height:15px;accent-color:#EA580C">
      📌 Pin this announcement`;
    wrap.appendChild(pinLabel);

    return wrap;
  },

  // Create new announcement modal
  openCreateModal() {
    const m = UI.modal({
      title: '📢 New Announcement',
      body:  this.buildForm(),
      size:  'lg',
      footer: [
        UI.button('Cancel', { variant:'ghost', size:'sm', onClick: () => m.close() }),
        Helpers.orangeBtn('Post Announcement', () => {
          const t = document.getElementById('ann-form-title')?.value.trim();
          const b = document.getElementById('ann-form-body')?.value.trim();
          if (!t || !b) { UI.toast('Please fill in all fields.', 'danger'); return; }
          ANNOUNCEMENTS.unshift({
            id:     nextAnnId++,
            pinned: document.getElementById('ann-form-pin')?.checked ?? false,
            title:  t,
            body:   b,
            author: COORDINATOR.name,
            date:   new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }),
          });
          this.renderList();
          m.close();
          UI.toast('Announcement posted!', 'success');
        }),
      ],
    });
    m.open();
  },

  // Edit existing announcement modal
  openEditModal(ann) {
    const m = UI.modal({
      title: '✏️ Edit Announcement',
      body:  this.buildForm({ title: ann.title, body: ann.body, pinned: ann.pinned }),
      size:  'lg',
      footer: [
        UI.button('Cancel', { variant:'ghost', size:'sm', onClick: () => m.close() }),
        Helpers.orangeBtn('Save Changes', () => {
          const t = document.getElementById('ann-form-title')?.value.trim();
          const b = document.getElementById('ann-form-body')?.value.trim();
          if (!t || !b) { UI.toast('Please fill in all fields.', 'danger'); return; }
          ann.title  = t;
          ann.body   = b;
          ann.pinned = document.getElementById('ann-form-pin')?.checked ?? false;
          this.renderList();
          m.close();
          UI.toast('Announcement updated.', 'success');
        }),
      ],
    });
    m.open();
  },
};


// ─────────────────────────────────────────────────────────────
//  BOOT  — build every section once on page load
// ─────────────────────────────────────────────────────────────
Dashboard    .build();
Interns      .build();
Announcements.build();
</script>
