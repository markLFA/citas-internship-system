  <style>
    body { font-family: 'DM Sans', sans-serif; background: #FFF7ED; margin: 0; }
    .cui-card-title, .cui-page-title { font-family: 'Sora', sans-serif; }

    /* Announcement item */
    .ann-item {
      background: #fff; border: 1px solid #FED7AA; border-radius: 12px;
      padding: 1.1rem 1.25rem; margin-bottom: .7rem;
      display: flex; gap: 1rem; align-items: flex-start;
      transition: box-shadow .15s;
    }
    .ann-item:hover  { box-shadow: 0 4px 12px rgba(234,88,12,.1); }
    .ann-item.pinned { border-color: #EA580C; background: #FFF7ED; }
    .ann-item-body    { flex: 1; min-width: 0; }
    .ann-item-title   { font-family: Sora,sans-serif; font-weight:700; color:#1A0A00; font-size:.95rem; }
    .ann-item-text    { font-size:.84rem; color:#6B3A1F; margin-top:.25rem; line-height:1.6; }
    .ann-item-meta    { font-size:.74rem; color:#9A6647; margin-top:.4rem; }
    .ann-item-actions { display:flex; flex-direction:column; gap:.4rem; flex-shrink:0; }

    /* Pending approval card — stacks vertically on small screens */
    .approval-card {
      background: #fff; border: 1px solid #FED7AA; border-radius: 12px;
      padding: 1.1rem 1.25rem; margin-bottom: .75rem;
      display: flex; align-items: center; gap: 1rem;
      flex-wrap: wrap;                        /* allows wrapping on narrow screens */
      transition: box-shadow .15s;
    }
    .approval-card:hover { box-shadow: 0 4px 12px rgba(234,88,12,.1); }
    .approval-info  { flex: 1; min-width: 180px; }  /* won't shrink below 180px */
    .approval-name  { font-family: Sora,sans-serif; font-weight:700; color:#1A0A00; font-size:.95rem; }
    .approval-meta  { font-size:.78rem; color:#9A6647; margin-top:.2rem; }
    .approval-badge { flex-shrink: 0; }
    .approval-actions {
      display: flex; gap: .5rem; flex-shrink: 0;
      flex-wrap: wrap;                        /* buttons themselves also wrap if needed */
    }
    /* On very narrow screens hide the badge (redundant with card context) */
    @media (max-width: 480px) {
      .approval-badge { display: none; }
      .approval-actions { width: 100%; justify-content: flex-end; }
      .approval-card { align-items: flex-start; }
    }

    /* Report status pills */
    .rs-pending  { background:#FEF3C7; color:#92400E; }
    .rs-approved { background:#D1FAE5; color:#065F46; }
    .rs-revision { background:#FEE2E2; color:#991B1B; }
    .rs-reviewed { background:#DBEAFE; color:#1E40AF; }
  </style>
</head>

const Helpers = {

  pageHeader(title, subtitle = '', action = null) {
    const wrap = document.createElement('div');
    wrap.className = 'cui-page-header';
    const left = document.createElement('div');
    left.innerHTML = `
      <div class="cui-page-title">${title}</div>
      ${subtitle ? `<div class="cui-page-subtitle">${subtitle}</div>` : ''}`;
    wrap.appendChild(left);
    if (action) wrap.appendChild(action);
    return wrap;
  },

  // Orange filled button — primary actions
  orangeBtn(label, onClick) {
    return UI.button(label, {
      size: 'sm',
      color: { base:'#EA580C', hover:'#C2410C', text:'#fff' },
      onClick,
    });
  },

  // Ghost button with orange hover — secondary actions
  ghostBtn(label, onClick) {
    return UI.button(label, {
      variant: 'ghost', size: 'sm',
      color: { base:'#FFF7ED', hover:'#FFEDD5', text:'#EA580C', border:'#FED7AA' },
      onClick,
    });
  },

  // Green approve button
  approveBtn(label, onClick) {
    return UI.button(label, {
      size: 'sm',
      color: { base:'#10B981', hover:'#059669', text:'#fff' },
      onClick,
    });
  },

  // Red reject button
  rejectBtn(label, onClick) {
    return UI.button(label, {
      size: 'sm',
      color: { base:'#FEF2F2', hover:'#FEE2E2', text:'#991B1B', border:'#FECACA' },
      onClick,
    });
  },

  // Intern avatar circle
  internAvatar(name, size = 'sm') {
    const av = UI.avatar(name, size);
    av.style.background = 'linear-gradient(135deg,#FF6B00,#EA580C)';
    av.style.flexShrink = '0';
    return av;
  },

  // Sidebar footer chip — avatar + name + role
  sidebarFooter(name, role) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;gap:.65rem';
    const av = UI.avatar(name, 'sm');
    av.style.cssText = 'background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.35)';
    const info = document.createElement('div');
    info.style.minWidth = '0';
    info.innerHTML = `
      <div style="font-size:.85rem;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</div>
      <div style="font-size:.72rem;color:rgba(255,255,255,.6)">${role}</div>`;
    wrap.append(av, info);
    return wrap;
  },

  // Swap content of a card container by id
  refreshCard(id, buildFn) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    el.appendChild(buildFn());
  },
};

function navigate(name) {
  document.querySelectorAll('.cui-section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  sidebar.setActive(SECTIONS[name]);
  const center = document.querySelector('.cui-navbar-center');
  if (center) center.textContent = SECTIONS[name];
  // Charts must be drawn after their canvas is visible
  if (name === 'analytics') setTimeout(() => Analytics.drawAllCharts(), 30);
}

const Dashboard = {

  build() {
    const sec  = document.getElementById('sec-dashboard');
    const hour = new Date().getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';

    sec.appendChild(Helpers.pageHeader(

    sec.appendChild( this.statStrip()  );
    sec.appendChild( this.bottomRow()  );

  // 4-number horizontal stat strip
  statStrip() {

      { value: INTERNS.length,                                    label: 'Total Interns',    color: '#EA580C' },
      { value: PENDING.length,                                    label: 'Pending Approval', color: '#F59E0B' },

    const approvalCardContainer = document.createElement('div');
    approvalCardContainer.id = 'pending-approvals-card-container';

    row.appendChild( this.recentReportsCard()        );
    row.appendChild( this.analyticsPreviewCard()    );
    return row;
  },

  // Quick view of pending registrations on dashboard
  pendingApprovalsCard() {
    const body = document.createElement('div');
    getPendingInterns().then(data => {
      PENDING = (data && !data.error) ? data : [];

      if (!PENDING.length) {
        //body.appendChild(UI.empty('✅', 'All caught up!', 'No pending registrations.'));
        const container = document.getElementById('pending-approvals-card-container');
        container.remove();

      } else {
        PENDING.slice(0, 3).forEach(p => {
          const item = document.createElement('div');
          item.style.cssText = 'display:flex;align-items:center;gap:.75rem;padding:.65rem 0;border-bottom:1px solid #FFF0E0';
          const info = document.createElement('div');
          info.style.flex = '1';
          info.innerHTML = `
            <div style="font-weight:700;font-size:.875rem;color:#1A0A00">${p.name}</div>
            <div style="font-size:.75rem;color:#9A6647">${p.email} · ${p.course}</div>`;
          const btn = Helpers.approveBtn('Approve', () => Approvals.approveIntern(p.id));
          item.append(Helpers.internAvatar(p.name), info, btn);
          body.appendChild(item);
        });

        if (PENDING.length > 3) {
          const more = document.createElement('p');
          more.style.cssText = 'font-size:.78rem;color:#9A6647;text-align:center;padding:.5rem 0 0';
          more.textContent   = `+${PENDING.length - 3} more pending`;
          body.appendChild(more);
        }
      }
      const container = document.getElementById('pending-approvals-card-container');
      container.appendChild(UI.card({
        title: '⏳ Pending Approvals',
        headerActions: UI.badge(PENDING.length, { base:'#FEF3C7', text:'#92400E' }),
        body,
        footer: PENDING.length ? [
          Helpers.ghostBtn('View all →', () => navigate('approvals')),
        ] : [],
      }) );

    });

  },

  // Quick view of 3 most recent reports on dashboard
  recentReportsCard() {
    const pending = REPORTS.filter(r => r.status === 'pending');
    const recent  = REPORTS.slice(0, 3);
    const body    = document.createElement('div');
    const sl = { pending:'rs-pending', approved:'rs-approved', revision:'rs-revision', reviewed:'rs-reviewed' };
    const tl = { pending:'⏳ Pending', approved:'✅ Approved', revision:'🔁 Revision', reviewed:'👁 Reviewed' };

    if (!REPORTS.length) {
      body.appendChild(UI.empty('📭', 'No reports yet', ''));
    } else {
      recent.forEach(r => {
        const item = document.createElement('div');
        item.style.cssText = 'display:flex;align-items:center;gap:.6rem;padding:.6rem 0;border-bottom:1px solid #FFF0E0';
        const left = document.createElement('div');
        left.style.flex = '1';
        left.innerHTML = `
          <div style="font-weight:700;font-size:.82rem;color:#1A0A00">${r.internName}</div>
          <div style="font-size:.73rem;color:#9A6647">${r.week}</div>`;
        const badge = document.createElement('span');
        badge.className   = 'cui-badge ' + sl[r.status];
        badge.textContent = tl[r.status];
        item.append(left, badge);
        body.appendChild(item);
      });
    }

    return UI.card({
      title: '📄 Weekly Reports',
      headerActions: UI.badge(pending.length + ' pending', { base:'#FEF3C7', text:'#92400E' }),
      body,
      footer: REPORTS.length ? [Helpers.ghostBtn('View all →', () => navigate('reports'))] : [],
    });
  },

  // Analytics snapshot card on dashboard
  analyticsPreviewCard() {
    const avgPct  = Math.round(INTERNS.reduce((s,i) => s + (i.totalHours/500*100), 0) / (INTERNS.length||1));
    const behind  = INTERNS.filter(i => (i.totalHours/500*100) < 70).length;
    const onPace  = INTERNS.length - behind;

    const body = document.createElement('div');

    // Mini donut-style completion ring using a progress arc
    const ringWrap = document.createElement('div');
    ringWrap.style.cssText = 'text-align:center;padding:.75rem 0 .5rem';
    ringWrap.innerHTML = `
      <div style="font-family:Sora,sans-serif;font-size:2rem;font-weight:800;color:#EA580C;line-height:1">${avgPct}%</div>
      <div style="font-size:.75rem;color:#9A6647;margin-top:.2rem">batch avg completion</div>`;
    body.appendChild(ringWrap);

    body.appendChild(UI.progress(avgPct, { color:{ base:'#EA580C' }, label:false }));

    // Quick stats
    body.appendChild(UI.statRow([
      { value: onPace, label: 'On Schedule', color: '#10B981' },
      { value: behind, label: 'Behind',      color: '#EF4444' },
    ]));

    const btn = Helpers.ghostBtn('View Full Analytics →', () => navigate('analytics'));
    btn.style.width     = '100%';
    btn.style.marginTop = '.75rem';
    btn.style.justifyContent = 'center';
    body.appendChild(btn);

    return UI.card({ title: '📊 Analytics Snapshot', body });
  },

// ─────────────────────────────────────────────────────────────
//  APPROVALS  (pending intern registrations)
// ─────────────────────────────────────────────────────────────
const Approvals = {

  build() {
    const sec = document.getElementById('sec-approvals');
    sec.appendChild(Helpers.pageHeader(
      'Pending Approvals',
      'Review and approve intern registration requests'
    ));

    const listWrap = document.createElement('div');
    listWrap.id = 'approvals-list-wrap';
    sec.appendChild(listWrap);
    fetch('config/api.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'getPendingInterns'
      })
    })
    .then(res => {
      console.log('API response status:', res.status);
      return res.json();
    })
    .then(data => {
      PENDING = data
    this.renderList();
    })
    .catch(error => {
      console.error('Fetch error:', error);
    });

  },
  renderList() {

    const wrap = document.getElementById('approvals-list-wrap');
    if (!wrap) return;
    wrap.innerHTML = '';

    if (!PENDING.length) {
      wrap.appendChild(UI.empty(
        '✅', 'No pending approvals',
        'All registration requests have been reviewed.'
      ));
      return;
    }

    // Header info
    const info = document.createElement('p');
    info.style.cssText = 'font-size:.85rem;color:#9A6647;margin-bottom:1rem';
    info.textContent   = `${PENDING.length} intern${PENDING.length !== 1 ? 's' : ''} waiting for approval. Approved interns can log in and access the intern portal.`;
    wrap.appendChild(info);

    PENDING.forEach(p => wrap.appendChild(this.approvalCard(p)));
  },

  // Single pending registration card
  approvalCard(p) {
    const wrap = document.createElement('div');
    wrap.className = 'approval-card';
    wrap.id        = `approval-${p.id}`;

    // Avatar
    wrap.appendChild(Helpers.internAvatar(p.name, 'md'));

    // Info
    const info = document.createElement('div');
    info.className = 'approval-info';
    info.innerHTML = `
      <div class="approval-name">${p.name}</div>
      <div class="approval-meta">
        ${p.email}
        <span style="margin:0 .3rem;opacity:.4">·</span>
        ${p.course}
        <span style="margin:0 .3rem;opacity:.4">·</span>
        ${p.year_level}
      </div>
      <div style="font-size:.72rem;color:#C4845A;margin-top:.2rem">
        Registered: ${p.created_at}
      </div>`;
    wrap.appendChild(info);

    // Pending badge
    const badge = document.createElement('div');
    badge.className = 'approval-badge';
    badge.appendChild(UI.badge('⏳ Pending', { base:'#FEF3C7', text:'#92400E' }));
    wrap.appendChild(badge);

    // Action buttons
    const actions = document.createElement('div');
    actions.className = 'approval-actions';

    actions.appendChild(UI.button('👁 View', {
      variant: 'ghost', size: 'sm',
      color: { base:'#FFF7ED', hover:'#FFEDD5', text:'#EA580C', border:'#FED7AA' },
      onClick: () => this.openDetailModal(p),
    }));

    actions.appendChild(Helpers.approveBtn('✅ Approve', () => this.approveIntern(p.id)));
    actions.appendChild(Helpers.rejectBtn('✗ Reject',   () => this.rejectIntern(p.id)));

    wrap.appendChild(actions);
    return wrap;
  },

  // Full registration detail modal before approving
  openDetailModal(p) {
    const body = document.createElement('div');

    // Profile header
    const header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid #FED7AA';
    const info = document.createElement('div');
    info.innerHTML = `
      <div style="font-family:Sora,sans-serif;font-size:1.05rem;font-weight:800;color:#1A0A00">${p.name}</div>
      <div style="font-size:.8rem;color:#9A6647;margin-top:.15rem">${p.email}</div>
      <div style="font-size:.8rem;color:#9A6647">${p.dept} · ${p.school}</div>`;
    header.append(Helpers.internAvatar(p.name, 'lg'), info);
    body.appendChild(header);

    // Registration info rows
    [
      ['📧', 'Email',       p.email],
      ['📚', 'Course/Dept', p.dept],
      ['🏫', 'School',      p.school],
      ['📅', 'Registered',  p.created_at],
    ].forEach(([icon, label, value]) => body.appendChild(UI.infoRow(icon, label, value)));

    // Status notice
    const notice = document.createElement('div');
    notice.style.cssText = 'margin-top:1.25rem;padding:.85rem 1rem;background:#FEF3C7;border:1px solid #FDE68A;border-radius:10px;font-size:.83rem;color:#92400E';
    notice.innerHTML = '⚠️ <strong>Pending approval.</strong> This intern cannot access the system until you approve their account.';
    body.appendChild(notice);

    const m = UI.modal({
      title: '📋 Registration Details',
      body,
      size: 'lg',
      footer: [
        UI.button('Close', { variant:'ghost', size:'sm', onClick: () => m.close() }),
        Helpers.rejectBtn('✗ Reject', () => {
          this.rejectIntern(p.id);
          m.close();
        }),
        Helpers.approveBtn('✅ Approve', () => {
          this.approveIntern(p.id);
          m.close();
        }),
      ],
    });
    m.open();
  },

  // Approve — moves from PENDING to INTERNS
  approveIntern(id) {
    fetch('config/api.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'approavePendingIntern',
        internId: id,
      })
    })
    const idx = PENDING.findIndex(p => p.id === id);
    if (idx === -1) return;

    const p = PENDING[idx];

    // Add to approved interns list with default stats
    INTERNS.push({
      id:          p.id,
      name:        p.name,
      email:       p.email,
      dept:        p.course,
      school:      p.year_level,
      company:     '—',
      supervisor:  '—',
      totalHours:  0,
      daysPresent: 0,
      reports:     0,
    });

    // Remove from pending
    PENDING.splice(idx, 1);

    // Update sidebar badge
    sidebar.setActive('Pending Approvals'); // triggers re-render of badge count
    this.renderList();
    this.updateApprovalsBadge();

    UI.toast(`✅ ${p.name} has been approved and can now log in.`, 'success');
  },

  // Reject — removes from PENDING with confirmation
  rejectIntern(id) {
    const p = PENDING.find(p => p.id === id);
    if (!p) return;
    if (!confirm(`Reject the registration of ${p.name}?\nThis will delete their account.`)) return;

    PENDING = PENDING.filter(p => p.id !== id);
    this.renderList();
    this.updateApprovalsBadge();

    UI.toast(`Registration for ${p.name} has been rejected.`, 'danger');
  },

  // Refresh the sidebar badge count after approve/reject
  updateApprovalsBadge() {
    // Re-build sidebar to update badge — simple approach for frontend demo
    // With PHP backend you'd just reload the page after the API call
    const badgeEl = document.querySelector('#intern-sidebar .cui-ps-btn-badge');
    if (badgeEl && PENDING.length === 0) badgeEl.remove();
    else if (badgeEl) badgeEl.textContent = PENDING.length;
  },
};


// ─────────────────────────────────────────────────────────────
//  INTERNS  (approved interns list)
// ─────────────────────────────────────────────────────────────
const Interns = {

  build() {
    const sec = document.getElementById('sec-interns');

    sec.appendChild(Helpers.pageHeader(
      'Interns',
      INTERNS.length + ' interns enrolled'
    ));

    sec.appendChild( this.filterBar()      );
    sec.appendChild( this.tableContainer() );
    this.renderTable();
  },

  // Search + dept filter + sort controls
  filterBar() {
    const bar = document.createElement('div');
    bar.className = 'cui-filter-bar';

    const search = UI.input({ placeholder: '🔍 Search name or email…' });
    search.addEventListener('input', e => {
      filterSearch = e.target.value.toLowerCase();
      this.renderTable();
    });

    const depts = [...new Set(INTERNS.map(i => i.dept))].sort();
    const dept  = UI.select({ options: depts, placeholder: 'All Departments' });
    dept.style.minWidth = '160px';
    dept.addEventListener('change', e => { filterDept = e.target.value; this.renderTable(); });

    const sort  = UI.select({ options: [
      { value:'name',    label:'Sort: Name A–Z'    },
      { value:'hours',   label:'Sort: Most Hours'  },
      { value:'days',    label:'Sort: Most Days'   },
      { value:'reports', label:'Sort: Most Reports'},
    ]});
    sort.style.minWidth = '160px';
    sort.addEventListener('change', e => { filterSort = e.target.value; this.renderTable(); });

    bar.append(search, dept, sort);
    return bar;
  },

  tableContainer() {
    const wrap = document.createElement('div');
    wrap.id = 'interns-table-wrap';
    return wrap;
  },

  filteredList() {
    return [...INTERNS]
      .filter(i =>
        (!filterSearch || i.name.toLowerCase().includes(filterSearch) || i.email.toLowerCase().includes(filterSearch)) &&
        (!filterDept   || i.dept === filterDept))
      .sort((a, b) => ({
        name:    a.name.localeCompare(b.name),
        hours:   b.totalHours  - a.totalHours,
        days:    b.daysPresent  - a.daysPresent,
        reports: b.reports      - a.reports,
      }[filterSort] ?? 0));
  },

  renderTable() {
    const list = this.filteredList();
    const wrap = document.getElementById('interns-table-wrap');
    if (!wrap) return;
    wrap.innerHTML = '';

    const tbl = UI.table([
      { key:'name', label:'Intern',
        render: (v, row) => {
          const cell = document.createElement('div');
          cell.style.cssText = 'display:flex;align-items:center;gap:.65rem';
          const info = document.createElement('div');
          info.innerHTML = `
            <div style="font-weight:700;color:#1A0A00">${v}</div>
            <div style="font-size:.75rem;color:#9A6647">${row.email}</div>`;
          cell.append(Helpers.internAvatar(v), info);
          return cell;
        }},
      { key:'dept',        label:'Dept'   },
      { key:'school',      label:'School',   render: v => `<span style="font-size:.82rem;color:#9A6647">${v}</span>` },
      { key:'company',     label:'Company',  render: v => `<span style="font-size:.82rem">${v}</span>` },
      { key:'daysPresent', label:'Days',     align:'center', render: v => UI.badge(v, { base:'#D1FAE5', text:'#065F46' }) },
      { key:'totalHours',  label:'Hours',    align:'center', render: v => `<strong style="color:#EA580C">${v}h</strong>` },
      { key:'reports',     label:'Reports',  align:'center', render: v => UI.badge(v, { base:'#DBEAFE', text:'#1E40AF' }) },
      { key:'id', label:'', align:'center',
        render: (_, row) => Helpers.ghostBtn('View', () => this.openDetailModal(row)) },
    ], list, {
      hoverable: true,
      emptyText: 'No interns match your filters.',
    });

    wrap.appendChild(UI.card({
      title:   `Showing ${list.length} intern${list.length !== 1 ? 's' : ''}`,
      padding: false,
      body:    tbl,
    }));
  },

  // Intern detail modal
  openDetailModal(intern) {
    const body = document.createElement('div');

    const header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid #FED7AA';
    const info = document.createElement('div');
    info.innerHTML = `
      <div style="font-family:Sora,sans-serif;font-size:1.05rem;font-weight:800;color:#1A0A00">${intern.name}</div>
      <div style="font-size:.8rem;color:#9A6647;margin-top:.15rem">${intern.email}</div>
      <div style="font-size:.8rem;color:#9A6647">${intern.dept} · ${intern.school}</div>`;
    header.append(Helpers.internAvatar(intern.name, 'lg'), info);
    body.appendChild(header);

    body.appendChild(UI.statRow([
      { value: intern.totalHours + 'h', label: 'Total Hours',   color: '#EA580C' },
      { value: intern.daysPresent,       label: 'Days Present',  color: '#10B981' },
      { value: intern.reports,           label: 'Reports Filed', color: '#6366F1' },
    ]));

    const pct = Math.min(100, Math.round(intern.totalHours / 500 * 100));
    const lbl = document.createElement('p');
    lbl.style.cssText = 'font-size:.78rem;color:#9A6647;margin:.9rem 0 .4rem';
    lbl.textContent   = `Completion: ${intern.totalHours}h of 500h required (${pct}%)`;
    body.appendChild(lbl);
    body.appendChild(UI.progress(pct, { color: { base:'#EA580C' }, label: true }));

    const compLabel = document.createElement('div');
    compLabel.style.cssText = 'font-family:Sora,sans-serif;font-weight:700;color:#1A0A00;font-size:.875rem;margin:1.25rem 0 .6rem';
    compLabel.textContent   = 'Internship Details';
    body.appendChild(compLabel);
    body.appendChild(UI.companyInfoCard({
      company:    intern.company,
      position:   intern.dept + ' Intern',
      supervisor: intern.supervisor,
    }));

    const m = UI.modal({
      title: '👤 Intern Details', body, size: 'lg',
      footer: [
        UI.button('Close', { variant:'ghost', size:'sm', onClick: () => m.close() }),
        Helpers.orangeBtn('Send Message', () => { UI.toast('Messaging coming soon!', 'info'); }),
      ],
    });
    m.open();
  },
};


// ─────────────────────────────────────────────────────────────
//  ANNOUNCEMENTS
// ─────────────────────────────────────────────────────────────
const Announcements = {

  build() {
    const sec = document.getElementById('sec-announcements');
    sec.appendChild(Helpers.pageHeader(
      'Announcements',
      'Post updates and notices for all interns',
      Helpers.orangeBtn('+ New Announcement', () => this.openCreateModal())
    ));
    const listWrap = document.createElement('div');
    listWrap.id = 'ann-list-wrap';
    sec.appendChild(listWrap);
    this.renderList();
  },

  renderList() {
    const wrap = document.getElementById('ann-list-wrap');
    if (!wrap) return;
    wrap.innerHTML = '';
    if (!ANNOUNCEMENTS.length) {
      wrap.appendChild(UI.empty('📭', 'No announcements yet', 'Post your first update.',
        Helpers.orangeBtn('+ New Announcement', () => this.openCreateModal())));
      return;
    }
    [...ANNOUNCEMENTS].sort((a,b) => b.pinned - a.pinned)
      .forEach(ann => wrap.appendChild(this.annItem(ann)));
  },

  annItem(ann) {
    const wrap = document.createElement('div');
    wrap.className = 'ann-item' + (ann.pinned ? ' pinned' : '');

    const body = document.createElement('div');
    body.className = 'ann-item-body';
    body.innerHTML = `
      ${ann.pinned ? '<span style="font-size:.72rem;font-weight:700;color:#EA580C;display:block;margin-bottom:.2rem">📌 Pinned</span>' : ''}
      <div class="ann-item-title">${ann.title}</div>
      <div class="ann-item-text">${ann.body}</div>
      <div class="ann-item-meta">By ${ann.author} · ${ann.date}</div>`;

    const actions = document.createElement('div');
    actions.className = 'ann-item-actions';

    actions.appendChild(Helpers.ghostBtn(ann.pinned ? 'Unpin' : '📌 Pin', () => {
      ann.pinned = !ann.pinned;
      this.renderList();
      UI.toast(ann.pinned ? 'Pinned.' : 'Unpinned.', 'info');
    }));
    actions.appendChild(Helpers.ghostBtn('✏️ Edit', () => this.openEditModal(ann)));
    actions.appendChild(UI.button('🗑 Delete', {
      variant:'ghost', size:'sm',
      color: { base:'#FEF2F2', hover:'#FEE2E2', text:'#991B1B', border:'#FECACA' },
      onClick: () => {
        if (!confirm(`Delete "${ann.title}"?`)) return;
        ANNOUNCEMENTS = ANNOUNCEMENTS.filter(a => a.id !== ann.id);
        this.renderList();
        UI.toast('Deleted.', 'danger');
      },
    }));

    wrap.append(body, actions);
    return wrap;
  },

  buildForm({ title='', body='', pinned=false } = {}) {
    const wrap = document.createElement('div');
    wrap.appendChild(UI.formGroup('Title',
      UI.input({ id:'ann-form-title', value:title, placeholder:'Announcement title', required:true }),
      '', { required:true }));
    wrap.appendChild(UI.formGroup('Message',
      UI.textarea({ id:'ann-form-body', value:body, placeholder:'Write your message…', rows:5 })));
    const pinLabel = document.createElement('label');
    pinLabel.style.cssText = 'display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.85rem;font-weight:600;color:#6B3A1F;margin-top:.5rem';
    pinLabel.innerHTML = `<input type="checkbox" id="ann-form-pin" ${pinned?'checked':''} style="width:15px;height:15px;accent-color:#EA580C"> 📌 Pin this announcement`;
    wrap.appendChild(pinLabel);
    return wrap;
  },

  openCreateModal() {
    const m = UI.modal({
      title: '📢 New Announcement', body: this.buildForm(), size: 'lg',
      footer: [
        UI.button('Cancel', { variant:'ghost', size:'sm', onClick: () => m.close() }),
        Helpers.orangeBtn('Post Announcement', () => {
          const t = document.getElementById('ann-form-title')?.value.trim();
          const b = document.getElementById('ann-form-body')?.value.trim();
          if (!t || !b) { UI.toast('Please fill in all fields.', 'danger'); return; }
          ANNOUNCEMENTS.unshift({
            id: nextAnnId++, title:t, body:b,
            pinned: document.getElementById('ann-form-pin')?.checked ?? false,
            author: COORDINATOR.name,
            date:   new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }),
          });
          this.renderList(); m.close();
          UI.toast('Announcement posted!', 'success');
        }),
      ],
    });
    m.open();
  },

  openEditModal(ann) {
    const m = UI.modal({
      title: '✏️ Edit Announcement',
      body:  this.buildForm({ title:ann.title, body:ann.body, pinned:ann.pinned }),
      size:  'lg',
      footer: [
        UI.button('Cancel', { variant:'ghost', size:'sm', onClick: () => m.close() }),
        Helpers.orangeBtn('Save Changes', () => {
          const t = document.getElementById('ann-form-title')?.value.trim();
          const b = document.getElementById('ann-form-body')?.value.trim();
          if (!t || !b) { UI.toast('Please fill in all fields.', 'danger'); return; }
          ann.title=t; ann.body=b;
          ann.pinned = document.getElementById('ann-form-pin')?.checked ?? false;
          this.renderList(); m.close();
          UI.toast('Updated.', 'success');
        }),
      ],
    });
    m.open();
  },
};

    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.1rem';

    const tabs = [
      { value:'',         label:'All' },
      { value:'pending',  label:'⏳ Pending'  },
      { value:'reviewed', label:'👁 Reviewed' },
      { value:'approved', label:'✅ Approved' },
      { value:'revision', label:'🔁 Revision' },
    ];

    tabs.forEach(t => {
      const count = t.value === '' ? REPORTS.length : REPORTS.filter(r => r.status === t.value).length;
      const btn   = document.createElement('button');
      btn.style.cssText = 'display:flex;align-items:center;gap:.35rem;padding:.4rem .9rem;border-radius:20px;font-size:.8rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;border:1.5px solid #FED7AA;background:#fff;color:#9A6647';

        reportFilterStatus = t.value;

    });

    wrap.appendChild(UI.card({
      title:   `${list.length} report${list.length !== 1 ? 's' : ''} ${reportFilterStatus ? '— ' + reportFilterStatus : ''}`,
      padding: false,
      body:    tbl,
    }));
  },

  // Review modal — read report + set status + write feedback
  openReviewModal(report) {
    const sl = { pending:'rs-pending', approved:'rs-approved', revision:'rs-revision', reviewed:'rs-reviewed' };
    const tl = { pending:'⏳ Pending', approved:'✅ Approved', revision:'🔁 Revision', reviewed:'👁 Reviewed' };
    let   selectedStatus = report.status;

    const body = document.createElement('div');

    // Header
    const hdr = document.createElement('div');
    hdr.style.cssText = 'display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid #FED7AA';
    hdr.innerHTML = `
      <div style="flex:1">
        <div style="font-family:Sora,sans-serif;font-weight:800;color:#1A0A00;font-size:1rem">${report.internName}</div>
        <div style="font-size:.8rem;color:#9A6647;margin-top:.15rem">${report.week} · ${report.dept}</div>
        <div style="font-size:.8rem;color:#9A6647">Submitted: ${report.date}</div>
      </div>`;
    const badge = document.createElement('span');
    badge.className   = 'cui-badge ' + sl[report.status];
    badge.textContent = tl[report.status];
    hdr.appendChild(badge);
    body.appendChild(hdr);

    // File link
    const fileLink = document.createElement('a');
    fileLink.href   = '#';
    fileLink.style.cssText = 'display:flex;align-items:center;gap:.5rem;padding:.75rem 1rem;background:#FFF7ED;border:1px solid #FED7AA;border-radius:10px;text-decoration:none;color:#EA580C;font-weight:600;font-size:.875rem;margin-bottom:1.25rem';
    fileLink.innerHTML = `📄 ${report.file} <span style="margin-left:auto;font-size:.75rem;color:#9A6647">Click to open</span>`;
    body.appendChild(fileLink);

    // Status selector buttons
    const statusLabel = document.createElement('div');
    statusLabel.style.cssText = 'font-size:.8rem;font-weight:700;color:#6B3A1F;margin-bottom:.5rem';
    statusLabel.textContent   = 'Set Status';
    body.appendChild(statusLabel);

    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1.25rem';

    const statusOptions = [
      { value:'reviewed', label:'👁 Mark Reviewed', base:'#DBEAFE', text:'#1E40AF', activeBg:'#1E40AF' },
      { value:'approved', label:'✅ Approve',        base:'#D1FAE5', text:'#065F46', activeBg:'#10B981' },
      { value:'revision', label:'🔁 Needs Revision', base:'#FEE2E2', text:'#991B1B', activeBg:'#EF4444' },
      { value:'pending',  label:'⏳ Keep Pending',   base:'#FEF3C7', text:'#92400E', activeBg:'#F59E0B' },
    ];

    statusOptions.forEach(opt => {
      const btn = document.createElement('button');
      btn.style.cssText = `padding:.55rem .75rem;border-radius:8px;font-size:.82rem;font-weight:600;font-family:inherit;cursor:pointer;border:2px solid transparent;transition:all .15s;background:${opt.base};color:${opt.text}`;
      btn.textContent   = opt.label;
      btn.dataset.value = opt.value;

      const highlight = () => {
        btnRow.querySelectorAll('button').forEach(b => {
          b.style.borderColor = 'transparent';
          b.style.transform   = 'none';
        });
        btn.style.borderColor = opt.activeBg;
        btn.style.transform   = 'scale(1.02)';
      };

      if (selectedStatus === opt.value) highlight();

      btn.addEventListener('click', () => {
        selectedStatus = opt.value;
        highlight();
      });
      btnRow.appendChild(btn);
    });
    body.appendChild(btnRow);

    // Feedback textarea
    body.appendChild(UI.formGroup('Feedback for Intern (optional)',
      UI.textarea({
        id:          'review-feedback',
        value:       report.feedback,
        placeholder: 'Write your comments or suggestions…',
        rows:        3,
      })
    ));

    const m = UI.modal({
      title: '📝 Review Report',
      body,
      size: 'lg',
      footer: [
        UI.button('Cancel', { variant:'ghost', size:'sm', onClick: () => m.close() }),
        Helpers.orangeBtn('Save Review', () => {
          const feedback = document.getElementById('review-feedback')?.value.trim() ?? '';
          report.status   = selectedStatus;
          report.feedback = feedback;
          this.renderTable();
          m.close();
          UI.toast('Review saved!', 'success');
        }),
      ],
    });
    m.open();
  },
};


// ─────────────────────────────────────────────────────────────
//  ANALYTICS
// ─────────────────────────────────────────────────────────────
const Analytics = {

  // Store chart instances so we can destroy before redrawing
  _charts: {},

  build() {
    const sec = document.getElementById('sec-analytics');
    sec.appendChild(Helpers.pageHeader(
      'Analytics',
      'Internship data insights for the current batch'
    ));

    // Top summary stat strip
    sec.appendChild( this.summaryStrip()  );

    // Two charts side by side
    const row1 = document.createElement('div');
    row1.className = 'pg-grid-2 mt-lg';
    row1.style.alignItems = 'start';
    row1.appendChild( this.completionChartCard()   );
    row1.appendChild( this.reportStatusChartCard() );
    sec.appendChild(row1);

    // Second row: attendance trend + dept comparison
    const row2 = document.createElement('div');
    row2.className = 'pg-grid-2 mt-lg';
    row2.style.alignItems = 'start';
    row2.appendChild( this.attendanceTrendCard()   );
    row2.appendChild( this.deptComparisonCard()    );
    sec.appendChild(row2);

    // Behind schedule table
    sec.appendChild( this.behindScheduleCard() );

    // Draw charts after DOM is attached (brief delay ensures canvas is visible)
    setTimeout(() => this.drawAllCharts(), 50);
  },

  // ── Summary strip ─────────────────────────────────────────
  summaryStrip() {
    const totalHours  = INTERNS.reduce((s, i) => s + i.totalHours, 0);
    const avgHours    = Math.round(totalHours / (INTERNS.length || 1));
    const avgPct      = Math.round(INTERNS.reduce((s,i) => s + (i.totalHours/500*100), 0) / (INTERNS.length||1));
    const onPace      = INTERNS.filter(i => (i.totalHours / 500 * 100) >= 25).length; // >= 25% by week 14
    const rptApproved = REPORTS.filter(r => r.status === 'approved').length;

    return UI.statRow([
      { value: avgHours + 'h',        label: 'Avg Hours / Intern',  color: '#EA580C' },
      { value: avgPct + '%',           label: 'Avg Completion',      color: '#10B981' },
      { value: onPace + '/' + INTERNS.length, label: 'On Schedule', color: '#6366F1' },
      { value: rptApproved,            label: 'Reports Approved',    color: '#F59E0B' },
    ]);
  },

  // ── Intern completion bar chart ────────────────────────────
  completionChartCard() {
    const canvas = document.createElement('canvas');
    canvas.id     = 'chart-completion';
    canvas.height = 260;

    return UI.card({
      title: '📊 Intern Completion Rate',
      body:  canvas,
    });
  },

  drawCompletionChart() {
    const ctx = document.getElementById('chart-completion');
    if (!ctx) return;
    if (this._charts.completion) this._charts.completion.destroy();

    const sorted = [...INTERNS].sort((a,b) => b.totalHours - a.totalHours);
    const pcts   = sorted.map(i => Math.min(100, Math.round(i.totalHours / 500 * 100)));
    const colors = pcts.map(p => p >= 50 ? '#10B981' : p >= 25 ? '#F59E0B' : '#EF4444');

    this._charts.completion = new Chart(ctx, {
      type: 'bar',
      data: {
        labels:   sorted.map(i => i.name),
        datasets: [{
          label:           'Completion %',
          data:            pcts,
          backgroundColor: colors,
          borderRadius:    6,
          borderSkipped:   false,
        }],
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const intern = sorted[ctx.dataIndex];
                return ` ${ctx.parsed.y}%  (${intern.totalHours}h of 500h)`;
              },
            },
          },
        },
        scales: {
          y: {
            min: 0, max: 100,
            ticks: { callback: v => v + '%', font: { size: 11 } },
            grid:  { color: '#FFF0E0' },
          },
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        },
      },
    });
  },

  // ── Report status donut chart ──────────────────────────────
  reportStatusChartCard() {
    const canvas = document.createElement('canvas');
    canvas.id     = 'chart-report-status';
    canvas.height = 220;

    const counts = {
      pending:  REPORTS.filter(r => r.status === 'pending').length,
      reviewed: REPORTS.filter(r => r.status === 'reviewed').length,
      approved: REPORTS.filter(r => r.status === 'approved').length,
      revision: REPORTS.filter(r => r.status === 'revision').length,
    };

    const body = document.createElement('div');
    body.appendChild(canvas);

    // Legend below chart
    const legend = document.createElement('div');
    legend.style.cssText = 'display:flex;flex-wrap:wrap;gap:.5rem 1rem;margin-top:.75rem;justify-content:center';
    [
      ['#FCD34D','Pending',  counts.pending],
      ['#93C5FD','Reviewed', counts.reviewed],
      ['#6EE7B7','Approved', counts.approved],
      ['#FCA5A5','Revision', counts.revision],
    ].forEach(([color, label, count]) => {
      const item = document.createElement('div');
      item.style.cssText = 'display:flex;align-items:center;gap:.3rem;font-size:.75rem;color:#6B3A1F';
      item.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></span>${label} (${count})`;
      legend.appendChild(item);
    });
    body.appendChild(legend);

    return UI.card({ title: '🍩 Report Status Breakdown', body });
  },

  drawReportStatusChart() {
    const ctx = document.getElementById('chart-report-status');
    if (!ctx) return;
    if (this._charts.reportStatus) this._charts.reportStatus.destroy();

    this._charts.reportStatus = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels:   ['Pending', 'Reviewed', 'Approved', 'Revision'],
        datasets: [{
          data: [
            REPORTS.filter(r => r.status === 'pending').length,
            REPORTS.filter(r => r.status === 'reviewed').length,
            REPORTS.filter(r => r.status === 'approved').length,
            REPORTS.filter(r => r.status === 'revision').length,
          ],
          backgroundColor: ['#FCD34D','#93C5FD','#6EE7B7','#FCA5A5'],
          borderWidth:     2,
          borderColor:     '#fff',
          hoverOffset:     6,
        }],
      },
      options: {
        responsive:  true,
        cutout:      '65%',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.label}: ${ctx.parsed} report${ctx.parsed !== 1 ? 's' : ''}`,
            },
          },
        },
      },
    });
  },

  // ── Weekly hours trend (batch average per week) ────────────
  attendanceTrendCard() {
    const canvas = document.createElement('canvas');
    canvas.id     = 'chart-attendance-trend';
    canvas.height = 220;

    return UI.card({
      title: '📈 Weekly Hours Trend (Batch Average)',
      body:  canvas,
    });
  },

  drawAttendanceTrendChart() {
    const ctx = document.getElementById('chart-attendance-trend');
    if (!ctx) return;
    if (this._charts.trend) this._charts.trend.destroy();

    // Simulated weekly average hours — PHP: GROUP BY WEEK(log_date), AVG(total_hours)
    const weeks = ['Week 1','Week 2','Week 3','Week 4','Week 5','Week 6',
                   'Week 7','Week 8','Week 9','Week 10','Week 11','Week 12','Week 13','Week 14'];
    const avgs  = [8.1, 7.9, 8.4, 8.2, 8.6, 8.3, 7.8, 8.5, 8.7, 8.2, 8.4, 8.1, 8.6, 8.3];

    this._charts.trend = new Chart(ctx, {
      type: 'line',
      data: {
        labels:   weeks,
        datasets: [{
          label:           'Avg Hours/Day',
          data:            avgs,
          borderColor:     '#EA580C',
          backgroundColor: 'rgba(234,88,12,.08)',
          pointBackgroundColor: '#EA580C',
          pointRadius:     4,
          pointHoverRadius:6,
          tension:         0.35,
          fill:            true,
        }],
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: {
            min:   7, max: 10,
            ticks: { callback: v => v + 'h', font: { size: 11 } },
            grid:  { color: '#FFF0E0' },
          },
          x: {
            grid:  { display: false },
            ticks: { font: { size: 10 }, maxRotation: 45 },
          },
        },
      },
    });
  },

  // ── Department comparison horizontal bar chart ─────────────
  deptComparisonCard() {
    const canvas = document.createElement('canvas');
    canvas.id     = 'chart-dept';
    canvas.height = 220;

    return UI.card({
      title: '🏫 Avg Completion by Department',
      body:  canvas,
    });
  },

  drawDeptChart() {
    const ctx = document.getElementById('chart-dept');
    if (!ctx) return;
    if (this._charts.dept) this._charts.dept.destroy();

    // Group interns by dept and average their completion
    const deptMap = {};
    INTERNS.forEach(i => {
      if (!deptMap[i.dept]) deptMap[i.dept] = [];
      deptMap[i.dept].push(Math.round(i.totalHours / 500 * 100));
    });
    const labels = Object.keys(deptMap);
    const avgs   = labels.map(d => {
      const vals = deptMap[d];
      return Math.round(vals.reduce((a,b) => a+b, 0) / vals.length);
    });

    this._charts.dept = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label:           'Avg Completion %',
          data:            avgs,
          backgroundColor: ['#FED7AA','#FDBA74','#FB923C'],
          borderRadius:    6,
          borderSkipped:   false,
        }],
      },
      options: {
        indexAxis:  'y',      // horizontal bars
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            min:   0, max: 100,
            ticks: { callback: v => v + '%', font: { size: 11 } },
            grid:  { color: '#FFF0E0' },
          },
          y: { grid: { display: false }, ticks: { font: { size: 12 } } },
        },
      },
    });
  },

  // ── Behind schedule table ──────────────────────────────────
  behindScheduleCard() {
    // Expected pct by week 14 of ~20 week internship = 70%
    const EXPECTED_PCT = 70;
    const behind = INTERNS
      .map(i => ({
        ...i,
        pct: Math.round(i.totalHours / 500 * 100),
        gap: EXPECTED_PCT - Math.round(i.totalHours / 500 * 100),
      }))
      .filter(i => i.pct < EXPECTED_PCT)
      .sort((a, b) => a.pct - b.pct);  // worst first

    if (!behind.length) {
      return UI.card({
        title: '✅ Schedule Status',
        body: UI.empty('🎉', 'All interns are on schedule!', `Everyone is at or above the expected ${EXPECTED_PCT}% mark.`),
      });
    }

    const tbl = UI.table([
      { key:'name',   label:'Intern',     render: v => `<strong>${v}</strong>` },
      { key:'dept',   label:'Dept' },
      { key:'totalHours', label:'Hours',  align:'center',
        render: v => `<span style="color:#EA580C;font-weight:700">${v}h</span>` },
      { key:'pct',    label:'Completion', align:'center',
        render: v => {
          const bar = document.createElement('div');
          bar.style.cssText = 'display:flex;align-items:center;gap:.5rem';
          const track = document.createElement('div');
          track.style.cssText = 'flex:1;height:6px;background:#FEE2E2;border-radius:10px;overflow:hidden';
          const fill  = document.createElement('div');
          fill.style.cssText  = `height:100%;width:${v}%;background:#EF4444;border-radius:10px`;
          track.appendChild(fill);
          bar.innerHTML = `<span style="font-size:.8rem;font-weight:700;color:#EF4444;width:35px">${v}%</span>`;
          bar.appendChild(track);
          return bar;
        }},
      { key:'gap',    label:'Behind By',  align:'center',
        render: v => UI.badge(v + '% behind', { base:'#FEE2E2', text:'#991B1B' }) },
    ], behind, { hoverable: true });

    return UI.card({
      title: `⚠️ Behind Schedule (${behind.length} intern${behind.length!==1?'s':''})`,
      padding: false,
      body: tbl,
    });
  },

  // Draw all charts at once
  drawAllCharts() {
    this.drawCompletionChart();
    this.drawReportStatusChart();
    this.drawAttendanceTrendChart();
    this.drawDeptChart();
  },
};


// ─────────────────────────────────────────────────────────────
//  BOOT  — Helpers must be defined before this runs

Dashboard    .build();
Analytics    .build();
Approvals    .build();
Interns      .build();
Reports      .build();
Announcements.build();
</script>
